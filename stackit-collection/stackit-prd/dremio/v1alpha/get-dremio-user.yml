http:
  method: GET
  url: "{{baseUrl}}/v1alpha/projects/:projectId/regions/:regionId/dremios/:dremioId/users/:dremioUserId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: dremioId
      value: ""
      type: path
      description: The Dremio UUID.
    - name: dremioUserId
      value: ""
      type: path
      description: The dremio user UUID.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns the details for the given dremio admin user
