info:
  name: Check Blob Existence
  type: http
  seq: 1
  tags:
    - Blobs

http:
  method: HEAD
  url: "{{baseUrl}}/v2/:namespace/:name/blobs/:digest"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Checks for the existence of a blob.
  Returns the blob's digest and content type in the headers if it exists.
