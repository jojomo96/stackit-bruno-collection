info:
  name: list-compatible-kubernetes-releases
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1beta1/listcompatiblekubernetesreleases"
  params:
    - name: talosVersion
      value: ""
      type: query
      description: The name of the Talos release.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response with all compatible kubernetes releases.
    request:
      url: "{{baseUrl}}/v1beta1/listcompatiblekubernetesreleases"
      method: GET
      params:
        - name: talosVersion
          value: ""
          type: query
          description: The name of the Talos release.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "k8s_releases": [
              "v1.33.0",
              "v1.33.1"
            ]
          }
  - name: 400 Response
    description: Bad request
    request:
      url: "{{baseUrl}}/v1beta1/listcompatiblekubernetesreleases"
      method: GET
      params:
        - name: talosVersion
          value: ""
          type: query
          description: The name of the Talos release.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "400",
            "message": "Bad request"
          }
  - name: 404 Response
    description: The given Talos release was not found.
    request:
      url: "{{baseUrl}}/v1beta1/listcompatiblekubernetesreleases"
      method: GET
      params:
        - name: talosVersion
          value: ""
          type: query
          description: The name of the Talos release.
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal server error. The application experienced some unexpected situation.
    request:
      url: "{{baseUrl}}/v1beta1/listcompatiblekubernetesreleases"
      method: GET
      params:
        - name: talosVersion
          value: ""
          type: query
          description: The name of the Talos release.
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
