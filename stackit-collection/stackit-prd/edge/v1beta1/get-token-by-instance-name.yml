info:
  name: get-token-by-instance-name
  type: http
  seq: 13

http:
  method: GET
  url: "{{baseUrl}}/v1beta1/projects/:projectId/regions/:regionId/instancesbyname/:displayName/token"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the instance is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region the instance is part of.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region the instance is part of.
      disabled: true
    - name: displayName
      value: ""
      type: path
      description: The instance display name.
    - name: expirationSeconds
      value: "3600"
      type: query
      description: Expiration of the included token in seconds
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

