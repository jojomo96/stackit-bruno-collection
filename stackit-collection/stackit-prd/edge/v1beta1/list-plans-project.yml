info:
  name: list-plans-project
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v1beta1/projects/:projectId/plans"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the plan is part of.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response with all defined plans.
    request:
      url: "{{baseUrl}}/v1beta1/projects/:projectId/plans"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the plan is part of.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "validPlans": [
              {
                "description": "Description for Service Plan",
                "id": "",
                "maxEdgeHosts": 0,
                "minEdgeHosts": 0,
                "name": "S"
              }
            ]
          }
  - name: 400 Response
    description: Bad request
    request:
      url: "{{baseUrl}}/v1beta1/projects/:projectId/plans"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the plan is part of.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "400",
            "message": "Bad request"
          }
  - name: 401 Response
    description: Unauthorized. You may have provided no or wrong credentials.
    request:
      url: "{{baseUrl}}/v1beta1/projects/:projectId/plans"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the plan is part of.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "401",
            "message": "Authorization failed"
          }
  - name: 500 Response
    description: Internal server error. The application experienced some unexpected situation.
    request:
      url: "{{baseUrl}}/v1beta1/projects/:projectId/plans"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the plan is part of.
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

