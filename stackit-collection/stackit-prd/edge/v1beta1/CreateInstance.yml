info:
  name: CreateInstance
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/v1beta1/projects/:projectId/regions/:regionId/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the instance is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region the instance is part of.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region the instance is part of.
      disabled: true
  body:
    type: json
    data: |-
      {
        "description": "",
        "displayName": "",
        "planId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

