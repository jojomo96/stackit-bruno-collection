      value: eu02
      type: path
      description: The STACKIT region the instance is part of.
      disabled: true
    - name: displayName
      value: ""
      type: path
      description: The instance display name.
  body:
    type: json
    data: |-
      {
        "description": "",
        "planId": ""
      }
  auth: inherit

