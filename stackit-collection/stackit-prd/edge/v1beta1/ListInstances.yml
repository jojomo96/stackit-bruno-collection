info:
  name: ListInstances
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/v1beta1/projects/:projectId/regions/:regionId/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the instance is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region the instance is part of.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region the instance is part of.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

