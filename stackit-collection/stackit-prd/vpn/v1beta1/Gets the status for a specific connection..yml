info:
  name: Gets the status for a specific connection.
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/v1beta1/projects/:projectId/regions/:region/gateways/:gatewayId/connections/:connectionId/status"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: eu01
      type: path
    - name: region
      value: eu02
      type: path
      disabled: true
    - name: gatewayId
      value: ""
      type: path
    - name: connectionId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

