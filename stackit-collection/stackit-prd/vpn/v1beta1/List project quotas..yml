info:
  name: List project quotas.
  type: http
  seq: 13

http:
  method: GET
  url: "{{baseUrl}}/v1beta1/projects/:projectId/regions/:region/quotas"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: eu01
      type: path
    - name: region
      value: eu02
      type: path
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieve the resource quotas and current usage for STACKIT VPN within a specific project and region.
