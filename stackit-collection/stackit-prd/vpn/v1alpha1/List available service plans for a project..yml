info:
  name: List available service plans for a project.
  type: http
  seq: 14

http:
  method: GET
  url: "{{baseUrl}}/v1alpha1/regions/:region/plans"
  params:
    - name: region
      value: eu01
      type: path
    - name: region
      value: eu02
      type: path
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/v1alpha1/regions/:region/plans"
      method: GET
      params:
        - name: region
          value: eu01
          type: path
        - name: region
          value: eu02
          type: path
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "defaultPlanId": "p500",
            "plans": [
              {
                "maxBandwidth": 500,
                "maxConnections": 2,
                "name": "VPN-IPSec-50-HA-EU01",
                "planId": "p500",
                "sku": "ST-0174501"
              }
            ]
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/v1alpha1/regions/:region/plans"
      method: GET
      params:
        - name: region
          value: eu01
          type: path
        - name: region
          value: eu02
          type: path
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": 400,
              "details": [
                {
                  "domain": "",
                  "metadata": {},
                  "reason": "INVALID_FIELD"
                }
              ],
              "message": "One or more fields are invalid.",
              "status": "BAD_REQUEST"
            }
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v1alpha1/regions/:region/plans"
      method: GET
      params:
        - name: region
          value: eu01
          type: path
        - name: region
          value: eu02
          type: path
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": 400,
              "details": [
                {
                  "domain": "",
                  "metadata": {},
                  "reason": "INVALID_FIELD"
                }
              ],
              "message": "One or more fields are invalid.",
              "status": "BAD_REQUEST"
            }
          }

docs: |
  Retrieve a list of available service plans available for provisioning a VPN in a specific `region`.    
  Use this to identify the `planId` required for gateway creation.
