info:
  name: Create a new connection on an existing VPN gateway.
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/v1alpha1/projects/:projectId/regions/:region/gateways/:gatewayId/connections"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: eu01
      type: path
    - name: region
      value: eu02
      type: path
      disabled: true
    - name: gatewayId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "displayName": "my-connection",
        "enabled": false,
        "localSubnets": [
          "10.10.10.10/32"
        ],
        "remoteSubnets": [
          "10.10.10.10/32"
        ],
        "staticRoutes": [
          "10.10.10.10/32"
        ],
        "tunnel1": {
          "bgp": {
            "remoteAsn": 0
          },
          "peering": {
            "localAddress": "0.0.0.0",
            "remoteAddress": "0.0.0.0"
          },
          "phase1": "",
          "phase2": "",
          "preSharedKey": "Super1Secret2Shared3Key4",
          "remoteAddress": "0.0.0.0"
        },
        "tunnel2": {
          "bgp": {
            "remoteAsn": 0
          },
          "peering": {
            "localAddress": "0.0.0.0",
            "remoteAddress": "0.0.0.0"
          },
          "phase1": "",
          "phase2": "",
          "preSharedKey": "Super1Secret2Shared3Key4",
          "remoteAddress": "0.0.0.0"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

