info:
  name: Update credentials for observability in a project.
  type: http
  seq: 5

http:
  method: PUT
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/credentials/:credentialsRef"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: credentialsRef
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "displayName": "my-metrics-credential",
        "password": "",
        "username": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

