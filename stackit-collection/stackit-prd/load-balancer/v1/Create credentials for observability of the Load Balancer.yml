info:
  name: Create credentials for observability of the Load Balancer
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/credentials"
  headers:
    - name: X-Request-ID
      value: 2438ac3c-37eb-4902-adef-ed16b4431030
  params:
    - name: projectId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "displayName": "my-metrics-credential",
        "password": "",
        "username": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create credentials can be used to store existing credentials, which are valid to be used for Load Balancer Observability.
   This means, e.g. when using ARGUS, that credentials first must be created for that ARGUS instance (by using their API) and
   then can be provided to the Load Balancer by storing them with this endpoint.
