info:
  name: Get a single credential reference in a project.
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/credentials/:credentialsRef"
  params:
    - name: projectId
      value: ""
      type: path
    - name: credentialsRef
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get Credentials
