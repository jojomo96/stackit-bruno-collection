info:
  name: List all credentials in a project.
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/credentials"
  params:
    - name: projectId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/credentials"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "credentials": [
              {
                "credentialsRef": "",
                "displayName": "my-metrics-credential",
                "username": ""
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/credentials"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
    response:
