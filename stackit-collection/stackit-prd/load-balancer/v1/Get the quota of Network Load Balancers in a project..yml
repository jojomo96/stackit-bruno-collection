info:
  name: Get the quota of Network Load Balancers in a project.
  type: http
  seq: 16

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/quota"
  params:
    - name: projectId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves the configured Network Load Balancer quota for the project. Limit can be changed via service request.
