info:
  name: Post create a new zone
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/zones"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
  body:
    type: json
    data: |-
      {
        "acl": "0.0.0.0/0,::/0",
        "contactEmail": "hostmaster@stackit.cloud",
        "defaultTTL": 3600,
        "description": "this is our example zone",
        "dnsName": "example.com",
        "expireTime": 1209600,
        "extensions": {},
        "isReverseZone": false,
        "name": "test",
        "negativeCache": 60,
        "primaries": [
          "192.0.2.1"
        ],
        "refreshTime": 3600,
        "retryTime": 600,
        "type": "primary"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

