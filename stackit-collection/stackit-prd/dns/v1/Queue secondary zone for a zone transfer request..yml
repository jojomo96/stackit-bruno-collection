info:
  name: Queue secondary zone for a zone transfer request.
  type: http
  seq: 17

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/zones/:zoneId/retrieve"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: zoneId
      value: ""
      type: path
      description: zone id
