info:
  name: Clone an existing zone with all record sets to a new zone with a different name
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/zones/:zoneId/clone"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: zoneId
      value: ""
      type: path
      description: zone id
  body:
    type: json
    data: |-
      {
        "adjustRecords": true,
        "description": "this is our example zone",
        "dnsName": "example.com",
        "name": "test"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Clone an existing zone with all record sets to a new zone with a different name
