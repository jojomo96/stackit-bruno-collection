info:
  name: Export all records in a single zone
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/zones/:zoneId/export"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: zoneId
      value: ""
      type: path
      description: zone id
  body:
    type: json
    data: |-
      {
        "exportAsFQDN": true,
        "format": "csv"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

