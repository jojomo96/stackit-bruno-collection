info:
  name: Get a single credential reference in a project.
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/credentials/:credentialsRef"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: credentialsRef
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Gets the stored Observability credentials.
