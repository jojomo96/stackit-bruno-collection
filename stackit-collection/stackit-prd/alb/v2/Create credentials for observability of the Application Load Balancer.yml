info:
  name: Create credentials for observability of the Application Load Balancer
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/credentials"
  headers:
    - name: X-Request-ID
      value: 2438ac3c-37eb-4902-adef-ed16b4431030
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "displayName": "my-metrics-credential",
        "password": "",
        "username": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Created credentials can be stored and used for the load balancer observability. For example, when using STACKIT
   Observability, credentials first must be created for that STACKIT Observability instance (by using their API or the
   STACKIT Portal) and then can be provided to the load balancer by storing them with this endpoint.
