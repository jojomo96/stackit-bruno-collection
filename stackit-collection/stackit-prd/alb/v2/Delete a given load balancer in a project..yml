info:
  name: Delete a given load balancer in a project.
  type: http
  seq: 8

http:
  method: DELETE
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/load-balancers/:name"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: name
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Deletes the specified Application Load Balancer.
