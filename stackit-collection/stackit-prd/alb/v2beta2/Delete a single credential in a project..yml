info:
  name: Delete a single credential in a project.
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/v2beta2/projects/:projectId/regions/:region/credentials/:credentialsRef"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: credentialsRef
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Deletes the stored Observability credentials.
