info:
  name: Get the quota of Application Load Balancers in a project.
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/v2beta2/projects/:projectId/regions/:region/quota"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves the configured Application Load Balancer quota for the project. Limit can be changed via service request.
