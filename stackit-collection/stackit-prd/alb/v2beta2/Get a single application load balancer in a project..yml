info:
  name: Get a single application load balancer in a project.
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/v2beta2/projects/:projectId/regions/:region/load-balancers/:name"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: name
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Retrieves details of a specific Application Load Balancer in a project.
   Includes creation and update information, current status, and any error descriptions.
