info:
  name: Create credentials for observability of the application load balancer
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v2beta2/projects/:projectId/regions/:region/credentials"
  headers:
    - name: X-Request-ID
      value: 2438ac3c-37eb-4902-adef-ed16b4431030
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "displayName": "my-metrics-credential",
        "password": "",
        "username": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

