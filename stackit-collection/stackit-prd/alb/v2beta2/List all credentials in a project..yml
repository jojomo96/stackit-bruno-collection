info:
  name: List all credentials in a project.
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v2beta2/projects/:projectId/regions/:region/credentials"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Lists the stored Observability credentials.
