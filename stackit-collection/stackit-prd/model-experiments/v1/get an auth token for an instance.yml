info:
  name: get an auth token for an instance
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances/:instanceId/tokens/:tId"
  params:
    - name: projectId
      value: 792ff0e7-be72-4135-91fa-74adab5cec76
      type: path
      description: portal project id
    - name: regionId
      value: eu01
      type: path
      description: region id
    - name: tId
      value: 94649fc3-5e97-4229-a891-b840f6bd67a8
      type: path
      description: token id
    - name: instanceId
      value: 57d11a2b-7366-46a7-9f45-2e0ebd079142
      type: path
      description: instance id
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

