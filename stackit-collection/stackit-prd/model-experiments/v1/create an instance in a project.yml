info:
  name: create an instance in a project
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances"
  params:
    - name: projectId
      value: 792ff0e7-be72-4135-91fa-74adab5cec76
      type: path
      description: portal project id
    - name: regionId
      value: eu01
      type: path
      description: region id
  body:
    type: json
    data: |-
      {
        "deletedExperimentRetention": "30d",
        "description": "My AI Model Experiments instance for project X",
        "labels": {
          "key": "value"
        },
        "name": "my-ai-model-experiments-instance"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

