info:
  name: delete an instance in a project
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances/:instanceId"
  params:
    - name: projectId
      value: 792ff0e7-be72-4135-91fa-74adab5cec76
      type: path
      description: portal project id
    - name: regionId
      value: eu01
      type: path
      description: region id
    - name: instanceId
      value: 57d11a2b-7366-46a7-9f45-2e0ebd079142
      type: path
      description: instance id
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

