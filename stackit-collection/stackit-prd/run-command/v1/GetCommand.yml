info:
  name: GetCommand
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/servers/:serverId/commands/:commandId"
  params:
    - name: projectId
      value: ""
      type: path
      description: ID of the project
    - name: serverId
      value: ""
      type: path
      description: Server ID of the machine
    - name: commandId
      value: ""
      type: path
      description: ID of the command
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

