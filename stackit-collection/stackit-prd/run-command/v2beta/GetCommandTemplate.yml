info:
  name: GetCommandTemplate
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v2beta/projects/:projectId/regions/:region/servers/:serverId/command-templates/:commandTemplateName"
  params:
    - name: projectId
      value: ""
      type: path
      description: ID of the project
    - name: serverId
      value: ""
      type: path
      description: Server ID of the machine
    - name: commandTemplateName
      value: ""
      type: path
      description: Name of the template
    - name: region
      value: eu01
      type: path
      description: region
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns details about a command template
