info:
  name: GetCommandTemplate
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v1beta/projects/:projectId/servers/:serverId/command-templates/:commandTemplateName"
  params:
    - name: projectId
      value: ""
      type: path
      description: ID of the project
    - name: serverId
      value: ""
      type: path
      description: Server ID of the machine
    - name: commandTemplateName
      value: ""
      type: path
      description: Name of the template
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: runShellTemplateExample
    request:
      url: "{{baseUrl}}/v1beta/projects/:projectId/servers/:serverId/command-templates/:commandTemplateName"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: ID of the project
        - name: serverId
          value: ""
          type: path
          description: Server ID of the machine
        - name: commandTemplateName
          value: ""
          type: path
          description: Name of the template
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "description": "Run Custom Shell Script",
            "name": "RunShellScript",
            "osType": [
              "linux"
            ],
            "parametersSchema": {
              "properties": {
                "script": {
                  "title": "Script",
