http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/mongodb-checks"
  params:
    - name: instanceId
      value: ""
      type: path
    - name: projectId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
