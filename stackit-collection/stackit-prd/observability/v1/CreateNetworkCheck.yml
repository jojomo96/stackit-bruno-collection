info:
  name: CreateNetworkCheck
  type: http
  seq: 82

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/network-checks"
  params:
    - name: instanceId
      value: ""
      type: path
    - name: projectId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "address": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

