examples:
  - name: 201 Response
    description: Get all technical credentials for an instance.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/credentials"
      method: GET
      params:
        - name: instanceId
          value: ""
          type: path
        - name: projectId
          value: ""
          type: path
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "credentials": [
              {
                "credentialsInfo": {
                  "description": "description",
                  "username": "test"
                },
                "id": "test",
                "name": "test"
              }
            ],
            "message": "Successfully received all technical users"
          }
  - name: 403 Response
    description: You are not authorized
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/credentials"
      method: GET
      params:
        - name: instanceId
          value: ""
          type: path
        - name: projectId
          value: ""
          type: path
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
