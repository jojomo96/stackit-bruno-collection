                    {
                      "to": "team-Y+paper@example.org"
                    }
                  ],
                  "name": "team-Y-paper"
                },
                {
                  "emailConfigs": [
                    {
                      "to": "team-X+alerts-critical@example.org"
                    }
                  ],
                  "name": "team-X-pager",
                  "opsgenieConfigs": [
                    {
                      "apiKey": "12345678",
                      "apiUrl": "https://example.opsgenie.org"
                    }
                  ]
                }
              ],
              "route": {
                "groupBy": [
                  "alertname",
                  "cluster",
                  "service"
                ],
                "groupInterval": "5m",
                "groupWait": "30s",
                "receiver": "team-X-mails",
                "repeatInterval": "3h",
                "routes": [
                  {
                    "matchRe": {
                      "service": "^(foo1|foo2|baz)$"
                    },
                    "receiver": "team-X-paper"
                  },
                  {
                    "match": {
                      "service": "files"
                    },
                    "receiver": "team-X-pager"
                  }
                ]
              }
            },
            "message": "Success"
          }
