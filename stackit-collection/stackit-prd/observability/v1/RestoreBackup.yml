  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/backup-restores/:backupDate"
  params:
    - name: backupDate
      value: ""
      type: path
    - name: instanceId
      value: ""
      type: path
    - name: projectId
      value: ""
      type: path
    - name: restoreTarget
      value: alertConfig
      type: query
      description: List of restore targets
    - name: restoreTarget
      value: alertRules
      type: query
      description: List of restore targets
      disabled: true
