      type: query
      description: List of restore targets
      disabled: true
    - name: restoreTarget
      value: grafana
      type: query
      description: List of restore targets
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

