info:
  name: ListRabbitmqChecks
  type: http
  seq: 90

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/rabbitmq-checks"
  params:
    - name: instanceId
      value: ""
      type: path
    - name: projectId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Get all rabbitmq checks.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/rabbitmq-checks"
      method: GET
      params:
        - name: instanceId
          value: ""
          type: path
        - name: projectId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Successfully got all rabbitmq checks",
            "rabbitmqChecks": [
              {
                "id": "489c740bf617ba3254d96d6cf0c9e6a5",
                "url": "http://localhost:15672"
              }
            ]
          }
  - name: 400 Response
    description: Something went wrong.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/rabbitmq-checks"
      method: GET
      params:
        - name: instanceId
          value: ""
          type: path
        - name: projectId
          value: ""
          type: path
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            "instance is not ready"
          ]
  - name: 403 Response
    description: You are not authorized.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/rabbitmq-checks"
      method: GET
      params:
        - name: instanceId
          value: ""
          type: path
        - name: projectId
          value: ""
          type: path
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": "You do not have permission to perform this action."
          }

