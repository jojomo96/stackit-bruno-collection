info:
  name: Update Service Account key
  type: http
  seq: 16

http:
  method: PATCH
  url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/keys/:keyId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project.
    - name: serviceAccountEmail
      value: ""
      type: path
      description: The email of the service account.
    - name: keyId
      value: ""
      type: path
      description: ID of the key.
  body:
    type: json
    data: |-
      {
        "active": false,
        "validUntil": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update a key. You can activate or deactivate a key, or set/delete validUntil. The key cannot be updated using the same service account (authenticated using the short lived token of the key).
