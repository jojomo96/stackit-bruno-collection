info:
  name: Create a new Service Account key
  type: http
  seq: 13

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/keys"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project.
    - name: serviceAccountEmail
      value: ""
      type: path
      description: The email of the service account.
  body:
    type: json
    data: |-
      {
        "algorithm": "RSA_2048",
        "publicKey": "",
        "validUntil": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new key to the service account. You can generate an RSA keypair, and post the PUBLIC part of the keypair, or leave empty, then the service will generate a pair. Maximum of 10 key can be added. A new key cannot be created using the same service account (authenticated using the short lived token of another key of the same service account).
