  url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/federations"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project.
    - name: serviceAccountEmail
      value: ""
      type: path
      description: The email of the service account.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List all the identity providers the service account is federated with.
