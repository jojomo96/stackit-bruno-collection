info:
  name: List Access Tokens of Service Account
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/access-tokens"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project.
    - name: serviceAccountEmail
      value: ""
      type: path
      description: The email of the Service Account.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/access-tokens"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The ID of the project.
        - name: serviceAccountEmail
          value: ""
          type: path
          description: The email of the Service Account.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "active": false,
                "createdAt": "",
                "id": "",
                "validUntil": ""
              }
            ]
          }
  - name: 400 Response
    description: Invalid User Token
    request:
      url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/access-tokens"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The ID of the project.
        - name: serviceAccountEmail
          value: ""
          type: path
          description: The email of the Service Account.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Bad Request",
            "message": "Some information about what caused the Error",
            "path": "/v1/path/which/returned/error",
            "status": 400,
            "timeStamp": "2019-08-24T14:15:22Z"
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/access-tokens"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The ID of the project.
        - name: serviceAccountEmail
          value: ""
          type: path
          description: The email of the Service Account.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": 401,
              "message": "The request could not be authorized",
              "status": "Unauthorized"
            }
          }
  - name: Forbidden Example
    request:
      url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/access-tokens"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The ID of the project.
        - name: serviceAccountEmail
          value: ""
          type: path
          description: The email of the Service Account.
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Forbidden",
            "message": "Service Account does not belong to Project or no access to project",
            "path": "/v1/path/which/returned/error",
            "status": 403,
            "timeStamp": "2019-08-24T14:15:22Z"
          }
  - name: Not Found Example
    request:
      url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/access-tokens"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The ID of the project.
        - name: serviceAccountEmail
          value: ""
          type: path
          description: The email of the Service Account.
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Not Found",
            "message": "{resource} not found",
            "path": "/v2/path/which/returned/error/{resource}",
            "status": 404,
            "timeStamp": "2019-08-24T14:15:22Z"
          }

docs: Get all Access Tokens of a Service Account. The token itself is not returned, only the metadata about the access tokens. Access tokens are listed until they are expired. Revoked tokens are returned until expired.
