info:
  name: Get service account key details
  type: http
  seq: 15

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/service-accounts/:serviceAccountEmail/keys/:keyId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project.
    - name: serviceAccountEmail
      value: ""
      type: path
      description: The email of the service account.
    - name: keyId
      value: ""
      type: path
      description: ID of the key.
    - name: format
      value: X509_PEM
      type: query
      description: Requested format for the public key
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get key details
