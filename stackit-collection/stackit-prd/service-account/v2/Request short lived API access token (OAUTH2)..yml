info:
  name: Request short lived API access token (OAUTH2).
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/token"
  body:
    type: form-urlencoded
    data:
      - name: assertion
        value: ""
        description: The self signed JWT. Must be given when grant_type is urn:ietf:params:oauth:grant-type:jwt-bearer
      - name: grant_type
        value: ""
        description: Always use URL encoded values. E.g. urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer
      - name: refresh_token
        value: ""
        description: Refresh token provided by a previous call with a self signed token. Must be given when grant_type is refresh_token
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/token"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: assertion
            value: ""
            description: The self signed JWT. Must be given when grant_type is urn:ietf:params:oauth:grant-type:jwt-bearer
          - name: grant_type
            value: ""
            description: Always use URL encoded values. E.g. urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer
          - name: refresh_token
            value: ""
            description: Refresh token provided by a previous call with a self signed token. Must be given when grant_type is refresh_token
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "expires_in": 3600,
            "refresh_token": "",
            "scope": "",
            "token_type": "Bearer"
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/token"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: assertion
            value: ""
            description: The self signed JWT. Must be given when grant_type is urn:ietf:params:oauth:grant-type:jwt-bearer
          - name: grant_type
            value: ""
            description: Always use URL encoded values. E.g. urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer
          - name: refresh_token
            value: ""
            description: Refresh token provided by a previous call with a self signed token. Must be given when grant_type is refresh_token
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Bad Request",
            "message": "Some information about what caused the Error",
            "path": "/v1/path/which/returned/error",
            "status": 400,
            "timeStamp": "2019-08-24T14:15:22Z"
          }
  - name: Forbidden Example
    request:
      url: "{{baseUrl}}/token"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: assertion
            value: ""
            description: The self signed JWT. Must be given when grant_type is urn:ietf:params:oauth:grant-type:jwt-bearer
          - name: grant_type
            value: ""
            description: Always use URL encoded values. E.g. urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer
          - name: refresh_token
            value: ""
            description: Refresh token provided by a previous call with a self signed token. Must be given when grant_type is refresh_token
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": 403,
              "message": "The request could not be performed",
              "status": "Forbidden"
            }
          }

docs: |-
  Request a short lived API access token with OAUTH2. Compatible with [Using JWTs as Authorization Grants](https://www.rfc-editor.org/rfc/rfc7523.html#section-2.1)
  You can request a token with a self signed token, or with a refresh token.
