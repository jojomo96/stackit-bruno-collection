info:
  name: Create a new Service Account
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/service-accounts"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project.
  body:
    type: json
    data: |-
      {
        "name": "my-sa-prefix"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new Service Account in a project. The service account only resides in the project, and initially has no roles or permissions on any resources. After creation, the service account can be assigned to this project, other projects in the parent organization or to the parent organization.
