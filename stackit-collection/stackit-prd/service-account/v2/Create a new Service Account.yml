info:
  name: Create a new Service Account
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/service-accounts"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project.
  body:
    type: json
    data: |-
      {
        "name": "my-sa-prefix"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

