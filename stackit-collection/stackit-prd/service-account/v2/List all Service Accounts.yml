info:
  name: List all Service Accounts
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/service-accounts"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List all Service Account resources in a project. Returns the service account resources, not the service accounts that has access to the project.
