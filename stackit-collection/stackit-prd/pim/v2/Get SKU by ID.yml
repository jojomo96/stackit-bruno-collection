info:
  name: Get SKU by ID
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/v2/skus/:skuId"
  params:
    - name: skuId
      value: ""
      type: path
      description: The unique identifier for a SKU.
    - name: language
      value: en
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
    - name: language
      value: de
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves a specific SKU by its ID, available for general public.
