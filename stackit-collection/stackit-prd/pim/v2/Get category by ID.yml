info:
  name: Get category by ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v2/categories/:categoryId"
  params:
    - name: categoryId
      value: ""
      type: path
      description: The unique identifier for a category.
    - name: language
      value: en
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
    - name: language
      value: de
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves a specific category by its ID, available for general public.
