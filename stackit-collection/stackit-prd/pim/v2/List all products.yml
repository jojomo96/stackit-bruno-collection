info:
  name: List all products
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/v2/products"
  params:
    - name: pageSize
      value: "10"
      type: query
      description: The number of items to retrieve per page
    - name: cursor
      value: ""
      type: query
      description: The cursor base64 encoded is used to retrieve the next page of results
      disabled: true
    - name: categoryName
      value: ""
      type: query
      description: The category's name to retrieve the data for
      disabled: true
    - name: productName
      value: ""
      type: query
      description: The product's name to retrieve the data for
      disabled: true
    - name: language
      value: en
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
    - name: language
      value: de
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves a list of all products, available for general public.
