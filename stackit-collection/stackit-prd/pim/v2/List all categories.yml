info:
  name: List all categories
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v2/categories"
  params:
    - name: pageSize
      value: "10"
      type: query
      description: The number of items to retrieve per page
    - name: cursor
      value: ""
      type: query
      description: The cursor base64 encoded is used to retrieve the next page of results
      disabled: true
    - name: categoryName
      value: ""
      type: query
      description: The category's name to retrieve the data for
      disabled: true
    - name: language
      value: en
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
    - name: language
      value: de
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns all categories, available for general public.
