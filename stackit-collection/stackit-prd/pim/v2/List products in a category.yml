info:
  name: List products in a category
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/v2/categories/:categoryId/products"
  params:
    - name: categoryId
      value: ""
      type: path
      description: The unique identifier for a category.
    - name: pageSize
      value: "10"
      type: query
      description: The number of items to retrieve per page
    - name: cursor
      value: ""
      type: query
      description: The cursor base64 encoded is used to retrieve the next page of results
      disabled: true
    - name: productName
      value: ""
      type: query
      description: The product's name to retrieve the data for
      disabled: true
    - name: language
      value: en
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
    - name: language
      value: de
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves a specific category's products, available for general public.
