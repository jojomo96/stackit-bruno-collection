info:
  name: Get product by ID
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/v2/products/:productId"
  params:
    - name: productId
      value: ""
      type: path
      description: The unique identifier for a product.
    - name: language
      value: en
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
    - name: language
      value: de
      type: query
      description: The language to retrieve the data in, available for en and de
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves a specific product by its ID, available for general public.
