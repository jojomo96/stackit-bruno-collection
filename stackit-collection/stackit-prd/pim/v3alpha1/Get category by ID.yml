info:
  name: Get category by ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v3alpha1/categories/:categoryId"
  headers:
    - name: Accept-Language
      value: ""
      description: ISO 639-1 language code (e.g., en, de, fr)
      disabled: true
  params:
    - name: categoryId
      value: ""
      type: path
      description: The unique identifier for a category.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

