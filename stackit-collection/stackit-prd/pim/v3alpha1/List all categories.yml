info:
  name: List all categories
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v3alpha1/categories"
  headers:
    - name: Accept-Language
      value: ""
      description: ISO 639-1 language code (e.g., en, de, fr)
      disabled: true
  params:
    - name: limit
      value: "10"
      type: query
      description: The number of items to retrieve per page
    - name: sort
      value: "[]"
      type: query
      description: Comma-separated list of fields. Use '-' for desc.
      disabled: true
    - name: cursor
      value: ""
      type: query
      description: The cursor base64 encoded is used to retrieve the next page of results
      disabled: true
    - name: name
      value: ""
      type: query
      description: The name to retrieve the data for
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

