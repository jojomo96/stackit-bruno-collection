info:
  name: List key rings
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/keyrings"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the key ring is located in.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response with all key rings.
    request:
      url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/keyrings"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the key ring is part of.
        - name: regionId
          value: eu01
          type: path
          description: The STACKIT region name the key ring is located in.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "keyRings": [
              {
                "createdAt": "",
                "description": "",
                "displayName": "",
                "id": "",
                "state": "creating"
