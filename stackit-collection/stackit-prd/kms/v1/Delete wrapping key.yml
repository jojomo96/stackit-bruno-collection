info:
  name: Delete wrapping key
  type: http
  seq: 24

http:
  method: DELETE
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/keyrings/:keyRingId/wrappingkeys/:wrappingKeyId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the key ring is located in.
    - name: keyRingId
      value: ""
      type: path
      description: The key ring UUID.
    - name: wrappingKeyId
      value: ""
      type: path
      description: The wrapping key UUID.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Deletes the given wrapping key
