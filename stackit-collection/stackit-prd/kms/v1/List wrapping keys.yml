info:
  name: List wrapping keys
  type: http
  seq: 22

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/keyrings/:keyRingId/wrappingkeys"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the key ring is located in.
    - name: keyRingId
      value: ""
      type: path
      description: The key ring UUID.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: All wrapping keys for the key ring have been returned.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/keyrings/:keyRingId/wrappingkeys"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the key ring is part of.
        - name: regionId
          value: eu01
          type: path
          description: The STACKIT region name the key ring is located in.
        - name: keyRingId
          value: ""
          type: path
          description: The key ring UUID.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "wrappingKeys": [
              {
                "access_scope": "PUBLIC",
                "algorithm": "rsa_2048_oaep_sha256",
                "createdAt": "",
                "description": "",
                "displayName": "",
