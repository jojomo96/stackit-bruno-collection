info:
  name: Create key ring
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/keyrings"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the key ring is located in.
  body:
    type: json
    data: |-
      {
        "description": "",
        "displayName": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

