info:
  name: Destroy version
  type: http
  seq: 15

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/keyrings/:keyRingId/keys/:keyId/versions/:versionNumber/destroy"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the key ring is located in.
    - name: keyRingId
      value: ""
      type: path
      description: The key ring UUID.
    - name: keyId
      value: ""
      type: path
      description: The key UUID.
    - name: versionNumber
      value: ""
      type: path
      description: The version number.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Removes the key material of a version permanently.
