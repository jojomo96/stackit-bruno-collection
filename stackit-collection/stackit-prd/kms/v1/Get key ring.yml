info:
  name: Get key ring
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/keyrings/:keyRingId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the key ring is located in.
    - name: keyRingId
      value: ""
      type: path
      description: The key ring UUID.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns the details for the given key ring.
