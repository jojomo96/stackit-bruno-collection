info:
  name: Create wrapping key
  type: http
  seq: 23

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/keyrings/:keyRingId/wrappingkeys"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the key ring is located in.
    - name: keyRingId
      value: ""
      type: path
      description: The key ring UUID.
  body:
    type: json
    data: |-
      {
        "access_scope": "PUBLIC",
        "algorithm": "rsa_2048_oaep_sha256",
        "description": "",
        "displayName": "",
        "protection": "software",
        "purpose": "wrap_symmetric_key"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Creates a new wrapping key for the given key ring.
