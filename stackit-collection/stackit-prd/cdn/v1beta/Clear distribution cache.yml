info:
  name: Clear distribution cache
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/v1beta/projects/:projectId/distributions/:distributionId/cache/purge"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project ID
    - name: distributionId
      value: ""
      type: path
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Clear the cache for this distribution.
  All content, regardless of its staleness, will get refetched from the host.
