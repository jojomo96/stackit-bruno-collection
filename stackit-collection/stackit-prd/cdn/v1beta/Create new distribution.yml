info:
  name: Create new distribution
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v1beta/projects/:projectId/distributions"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project ID
  body:
    type: json
    data: |-
      {
        "originUrl": "httpbin.org",
        "regions": [
          "EU",
          "ASIA"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: CreateDistribution will create a new CDN distribution
