info:
  name: Create new distribution
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v1beta/projects/:projectId/distributions"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project ID
  body:
    type: json
    data: |-
      {
        "originUrl": "httpbin.org",
        "regions": [
          "EU",
          "ASIA"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: created (standard distribution)
    description: |
      The distribution in its initial state.
      This will have the status `CREATING`.

      Using the `GET` endpoint and the `id` you can poll the status of the distribution.
      More info about the contents can be found in the *Get distribution by ID* response example.
    request:
      url: "{{baseUrl}}/v1beta/projects/:projectId/distributions"
      method: POST
      params:
        - name: projectId
          value: ""
          type: path
          description: Your STACKIT Project ID
      body:
        type: json
        data: |-
          {
            "originUrl": "httpbin.org",
            "regions": [
              "EU",
              "ASIA"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "distribution": {
              "config": {
                "backend": {
                  "originRequestHeaders": {},
                  "originUrl": "https://httpbin.org",
                  "type": "http"
                },
                "regions": [
                  "EU",
                  "ASIA"
                ]
              },
              "createdAt": "2024-09-26T09:00:00.12345Z",
              "domains": [],
              "id": "8bfaecd1-f880-4fa1-9884-1fb492aa4647",
              "projectId": "d043e216-af6e-445f-b5a5-cd67b2593278",
              "status": "CREATING",
              "updatedAt": "2024-09-26T09:00:00.12345Z"
            }
          }
