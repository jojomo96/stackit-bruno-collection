  type: http
  seq: 11

http:
  method: PUT
  url: "{{baseUrl}}/v1beta/projects/:projectId/distributions/:distributionId/customDomains/:domain"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project ID
    - name: distributionId
      value: ""
      type: path
    - name: domain
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "certificate": {},
        "intentId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

