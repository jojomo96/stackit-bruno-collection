info:
  name: Get Infos about the Caching State
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/v1beta2/projects/:projectId/distributions/:distributionId/cache"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project Id
    - name: distributionId
      value: ""
      type: path
    - name: purgePath
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Return caching info metadata, which contains the last cache purging time and a history of the most recent *full* purges.

  If (and only if) you provide the path query parameter, the history will also contain granular cache purges. 
  The request will not fail if no data about a path is found.
