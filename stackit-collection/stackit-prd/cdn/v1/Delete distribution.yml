info:
  name: Delete distribution
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/v1/projects/:projectId/distributions/:distributionId"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project Id
    - name: distributionId
      value: ""
      type: path
    - name: intentId
      value: ""
      type: query
      description: |
        While optional, it is greatly encouraged to provide an `intentId`. 
        This is used to deduplicate requests.  
        If multiple DELETE-Requests with the same `intentId` are received, all but the first request are dropped.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  DeleteDistribution accepts a project- and distribution-Id and will delete a distribution.
