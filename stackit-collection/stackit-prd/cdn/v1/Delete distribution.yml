          description: |
            While optional, it is greatly encouraged to provide an `intentId`.
            This is used to deduplicate requests.
            If multiple DELETE-Requests with the same `intentId` are received, all but the first request are dropped.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: deleting
    description: |
      Similar to `UPDATING`, this status is set when a Delete-Request was received.
      It will remain with this status until the deletion was synchronized.

      Once synchronized, the distribution is deleted.
      Further attempts to delete this response will return an empty response.
