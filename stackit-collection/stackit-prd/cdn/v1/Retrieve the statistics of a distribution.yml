info:
  name: Retrieve the statistics of a distribution
  type: http
  seq: 14

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/distributions/:distributionId/statistics"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project Id
    - name: distributionId
      value: ""
      type: path
    - name: from
      value: ""
      type: query
      description: the start of the time range for which statistics should be returned
    - name: to
      value: ""
      type: query
      description: |
        the end of the time range for which statistics should be returned. If not specified, 
        the end of the current time interval is used, e.g. next day for daily, 
        next month for monthly, and so on.
      disabled: true
    - name: interval
      value: hourly
      type: query
      description: |
        Over which interval should statistics be aggregated? 
        defaults to hourly resolution

        **NOTE**: Intervals are grouped in buckets that start and end based on a day in UTC+0 time.
        So for the `daily` interval, the group starts (inclusive) and ends (exclusive) at `00:00Z`
      disabled: true
    - name: interval
      value: daily
      type: query
      description: |
        Over which interval should statistics be aggregated? 
        defaults to hourly resolution

        **NOTE**: Intervals are grouped in buckets that start and end based on a day in UTC+0 time.
        So for the `daily` interval, the group starts (inclusive) and ends (exclusive) at `00:00Z`
      disabled: true
    - name: interval
      value: monthly
      type: query
      description: |
        Over which interval should statistics be aggregated? 
        defaults to hourly resolution

        **NOTE**: Intervals are grouped in buckets that start and end based on a day in UTC+0 time.
        So for the `daily` interval, the group starts (inclusive) and ends (exclusive) at `00:00Z`
      disabled: true
    - name: interval
      value: yearly
      type: query
      description: |
        Over which interval should statistics be aggregated? 
        defaults to hourly resolution

        **NOTE**: Intervals are grouped in buckets that start and end based on a day in UTC+0 time.
        So for the `daily` interval, the group starts (inclusive) and ends (exclusive) at `00:00Z`
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Returns the statistics of the distribution in the given
  time range. The response is a list of statistics records. Each record aggregates the statistics for its time interval.
  In case no statistics for a time interval exist, no record is returned.
  The time range for which statistics should be returned can be configured using query parameters.

  Timestamps are assumed to be UTC. This is especially important for the "buckets" when you, for example, return daily information. A day always starts and ends at 00:00Z.

  **Important Note:** Lower bounds are inclusive, upper bounds are exclusive. If you, for example, want a daily grouped which starts on the 1st Jan and also contains the full 10th Jan day, you would define `2025-01-01T00:00:00Z` as the lower and `2025-01-11T00:00:00Z` as the upper bound.

  The upper bound is optional. If you omit it, the API will use the start of the next interval as the upper bound.  
  Example: if `interval` is `hourly`, `from` would default to the start of the next hour, if it's `daily`, `from` would default to the start of the next day, etc.
