info:
  name: Retrieve a specific custom domain
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/distributions/:distributionId/customDomains/:domain"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project Id
    - name: distributionId
      value: ""
      type: path
    - name: domain
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Returns a 200 and the custom domain if this custom domain was associated to this distribution, else 404
