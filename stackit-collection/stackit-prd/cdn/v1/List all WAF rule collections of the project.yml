  type: http
  seq: 15

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/waf/collections"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project Id
  auth: inherit

settings:
