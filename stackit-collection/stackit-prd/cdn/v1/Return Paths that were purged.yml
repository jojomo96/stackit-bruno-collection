          description: |
            A substring of the search query.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: ""
  - name: 422 Response
    description: unprocessable entity - please make sure the body you provided is constructed according to spec
    request:
