info:
  name: Return Paths that were purged
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/distributions/:distributionId/cache/paths"
  params:
    - name: projectId
      value: ""
      type: path
      description: Your STACKIT Project Id
    - name: distributionId
      value: ""
      type: path
    - name: path
      value: ""
      type: query
      description: |
        A substring of the search query.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: hasData
    description: |
      There are some paths that were purged for the current distribution and
      match the user-provided search string. The response is sorted time-descending
      by the last time said path was purged. There are no duplicates in the response.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/distributions/:distributionId/cache/paths"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: Your STACKIT Project Id
        - name: distributionId
          value: ""
          type: path
        - name: path
          value: ""
          type: query
          description: |
            A substring of the search query.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "response": [
              {
                "path": "/some/path"
              },
              {
                "path": "/some/path/123"
              }
            ]
          }
  - name: noPaths
    description: There are no paths that match the substring that the user provided
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/distributions/:distributionId/cache/paths"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: Your STACKIT Project Id
        - name: distributionId
          value: ""
          type: path
        - name: path
          value: ""
          type: query
          description: |
            A substring of the search query.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
