info:
  name: List organizations
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:region/organizations"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: withDetails
      value: "false"
      type: query
      description: Adds the details to the response that can be queried from the Cloud Controller API
    - name: orderBy
      value: ""
      type: query
      description: |
        In case `withDetails` is enabled, the organization list can be sorted by `name`.

        In order to sort by `name`, you have to set the value `name`.
        The default sort ordering is ascending.
        To specify descending order for `name` field, you have to append ` desc` suffix; for example `name desc`.
      disabled: true
    - name: page
      value: "1"
      type: query
      description: Which page is returned
    - name: perPage
      value: "100"
      type: query
      description: Elements to be returned per page
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns a list of organizations for a specific STACKIT project.
