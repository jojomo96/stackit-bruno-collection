info:
  name: List organization quotas on a platform
  type: http
  seq: 22

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:region/platforms/:platformId/quotas"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: platformId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

