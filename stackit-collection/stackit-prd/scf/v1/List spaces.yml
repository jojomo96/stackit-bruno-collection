info:
  name: List spaces
  type: http
  seq: 13

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:region/organizations/:organizationId/spaces"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: organizationId
      value: ""
      type: path
    - name: page
      value: "1"
      type: query
      description: Which page is returned
    - name: perPage
      value: "100"
      type: query
      description: Elements to be returned per page
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

