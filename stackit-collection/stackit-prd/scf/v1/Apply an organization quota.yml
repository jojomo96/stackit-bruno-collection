info:
  name: Apply an organization quota
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:region/organizations/:organizationId/quota"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: organizationId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "quotaId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

