info:
  name: Get Bucket
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/v1/project/:projectId/bucket/:bucketName"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
    - name: bucketName
      value: bucket-1
      type: path
      description: The name has to be dns-conform.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get information for the given bucket in the project.
