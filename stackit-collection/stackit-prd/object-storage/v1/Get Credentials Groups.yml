info:
  name: Get Credentials Groups
  type: http
  seq: 20

http:
  method: GET
  url: "{{baseUrl}}/v1/project/:projectId/credentials-groups"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

