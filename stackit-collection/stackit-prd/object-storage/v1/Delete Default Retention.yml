info:
  name: Delete Default Retention
  type: http
  seq: 10

http:
  method: DELETE
  url: "{{baseUrl}}/v1/project/:projectId/bucket/:bucketName/default-retention"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
    - name: bucketName
      value: bucket-1
      type: path
      description: The name has to be dns-conform.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Remove the default retention from a bucket. Object Lock itself remains enabled.
