info:
  name: Create Bucket
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/v1/project/:projectId/bucket/:bucketName"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
    - name: bucketName
      value: bucket-1
      type: path
      description: The name has to be dns-conform.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a bucket for the given project. Bucket with the same name
  cannot already exists in the object storage
