info:
  name: Delete Bucket
  type: http
  seq: 7

http:
  method: DELETE
  url: "{{baseUrl}}/v2/project/:projectId/regions/:region/bucket/:bucketName"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
    - name: region
      value: eu01
      type: path
      description: STACKIT Region
    - name: bucketName
      value: bucket-1
      type: path
      description: The name has to be dns-conform.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

