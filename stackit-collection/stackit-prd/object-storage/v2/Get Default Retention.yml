info:
  name: Get Default Retention
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/v2/project/:projectId/regions/:region/bucket/:bucketName/default-retention"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
    - name: region
      value: eu01
      type: path
      description: STACKIT Region
    - name: bucketName
      value: bucket-1
      type: path
      description: The name has to be dns-conform.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the default retention configuration for a bucket.
