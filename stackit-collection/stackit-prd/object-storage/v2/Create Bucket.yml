info:
  name: Create Bucket
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/v2/project/:projectId/regions/:region/bucket/:bucketName"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
    - name: region
      value: eu01
      type: path
      description: STACKIT Region
    - name: bucketName
      value: bucket-1
      type: path
      description: The name has to be dns-conform.
    - name: objectLockEnabled
      value: "false"
      type: query
      description: Enable S3 Object Lock on this bucket. Can only be set at creation time. Requires an active project-level compliance lock.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a bucket for the given project. Bucket with the same name cannot already exists in the object storage
