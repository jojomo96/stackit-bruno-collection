info:
  name: Get Credentials Group
  type: http
  seq: 19

http:
  method: GET
  url: "{{baseUrl}}/v2/project/:projectId/regions/:region/credentials-group/:groupId"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
    - name: region
      value: eu01
      type: path
      description: STACKIT Region
    - name: groupId
      value: 3969597f-d2f3-4c07-8533-1a4bf8159c0e
      type: path
      description: Id of the credentials group
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

