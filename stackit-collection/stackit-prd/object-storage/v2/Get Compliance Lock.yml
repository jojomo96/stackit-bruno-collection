http:
  method: GET
  url: "{{baseUrl}}/v2/project/:projectId/regions/:region/compliance-lock"
  params:
    - name: projectId
      value: cd5e788d-5b7b-4ab9-a20d-e790205df10b
      type: path
      description: STACKIT project ID
    - name: region
      value: eu01
      type: path
      description: STACKIT Region
  auth: inherit

settings:
