  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/instances/:instanceId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: instanceId
      value: ""
      type: path
      description: The Logs Instance UUID.
  body:
    type: json
    data: |-
      {
        "acl": [
          "192.168.0.1/32"
        ],
        "description": "",
        "displayName": "",
        "retentionDays": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Updates the given Logs instance.
