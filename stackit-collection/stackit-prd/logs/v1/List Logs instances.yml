info:
  name: List Logs instances
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response with all Logs instances.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the resource is located in.
        - name: regionId
          value: eu01
          type: path
          description: The STACKIT region name the resource is located in.
        - name: regionId
          value: eu02
          type: path
          description: The STACKIT region name the resource is located in.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "instances": [
              {
                "acl": [
                  "192.168.0.1/32"
                ],
                "created": "",
                "datasourceUrl": "",
                "description": "",
                "displayName": "",
                "id": "",
                "ingestOtlpUrl": "",
                "ingestUrl": "",
                "queryRangeUrl": "",
                "queryUrl": "",
                "retentionDays": 0,
                "status": "active"
              }
            ]
          }
  - name: 400 Response
    description: Bad Request. The data provided by the client did not match expectations.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the resource is located in.
        - name: regionId
          value: eu01
          type: path
          description: The STACKIT region name the resource is located in.
        - name: regionId
          value: eu02
          type: path
          description: The STACKIT region name the resource is located in.
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized. You may have provided no or wrong credentials.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the resource is located in.
        - name: regionId
          value: eu01
          type: path
          description: The STACKIT region name the resource is located in.
        - name: regionId
          value: eu02
          type: path
          description: The STACKIT region name the resource is located in.
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: Jwt is missing
  - name: 500 Response
    description: Internal server error. The application experienced some unexpected situation.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the resource is located in.
        - name: regionId
          value: eu01
          type: path
          description: The STACKIT region name the resource is located in.
        - name: regionId
          value: eu02
          type: path
          description: The STACKIT region name the resource is located in.
          disabled: true
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: Returns a list of all Logs instances within the project.
