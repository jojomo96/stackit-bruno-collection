info:
  name: Get Access Token
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/instances/:instanceId/access-tokens/:tId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: instanceId
      value: ""
      type: path
      description: The Logs Instance UUID.
    - name: tId
      value: ""
      type: path
      description: The access token UUID.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the information of the given access token.
