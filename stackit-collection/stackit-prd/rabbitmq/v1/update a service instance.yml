info:
  name: update a service instance
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId"
  params:
    - name: projectId
      value: ""
      type: path
    - name: instanceId
      value: ""
      type: path
      description: id of the instance being updated
  body:
    type: json
    data: |-
      {
        "instanceName": "",
        "parameters": {
          "consumer_timeout": 0,
          "enable_monitoring": false,
          "graphite": "yourspace.your-graphite-endpoint.com:12345",
          "max_disk_threshold": 90,
          "metrics_frequency": 0,
          "metrics_prefix": "my-prefix",
          "monitoring_instance_id": "",
          "plugins": [
            "rabbitmq_consistent_hash_exchange"
          ],
          "roles": [
            "administrator",
            "management"
          ],
          "sgw_acl": "0.0.0.0/0",
          "syslog": [
            "logs4.your-syslog-endpoint.com:54321"
          ],
          "tls-ciphers": [
            "ECDHE-ECDSA-AES256-GCM-SHA384",
            "ECDHE-RSA-AES256-GCM-SHA384"
          ],
          "tls-protocols": [
            "tlsv1.2"
          ]
        },
        "planId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update a service instance. This could be a sgw acl update or a plan upgrade.
