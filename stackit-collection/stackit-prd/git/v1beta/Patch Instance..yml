info:
  name: Patch Instance.
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{baseUrl}}/v1beta/projects/:projectId/instances/:instanceId"
  params:
    - name: projectId
      value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
      type: path
      description: Project identifier.
    - name: instanceId
      value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
      type: path
      description: Instance identifier.
  body:
    type: json
    data: |-
      {
        "acl": [
          "1.1.1.1/1",
          "1.2.3.4/5"
        ],
        "feature_toggle": {
          "default_email_notifications": "enabled",
          "enable_local_login": true
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

