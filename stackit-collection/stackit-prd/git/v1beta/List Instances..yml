info:
  name: List Instances.
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v1beta/projects/:projectId/instances"
  params:
    - name: projectId
      value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
      type: path
      description: Project identifier.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Lists all STACKIT Git instances within a project.
