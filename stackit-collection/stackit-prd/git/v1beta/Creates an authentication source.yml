info:
  name: Creates an authentication source
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/v1beta/projects/:projectId/instances/:instanceId/authentications"
  params:
    - name: projectId
      value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
      type: path
      description: Project identifier.
    - name: instanceId
      value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
      type: path
      description: Instance identifier.
  body:
    type: json
    data: |-
      {
        "auto_discover_url": "https://auth.example.com/.well-known/openid-configuration",
        "client_id": "stackit-client",
        "client_secret": "new-client-secret",
        "icon_url": "https://stackit.example.com/icon.png",
        "name": "stackit",
        "provider": "openidConnect",
        "scopes": "openid profile email"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Creates an authentication source for the corresponding STACKIT Git instance
