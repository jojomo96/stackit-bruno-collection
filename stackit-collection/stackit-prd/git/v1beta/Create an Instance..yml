info:
  name: Create an Instance.
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v1beta/projects/:projectId/instances"
  params:
    - name: projectId
      value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
      type: path
      description: Project identifier.
  body:
    type: json
    data: |-
      {
        "acl": [
          "1.2.3.4/1"
        ],
        "flavor": "git-100",
        "name": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

