info:
  name: Returns the details for the given STACKIT Git flavors.
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1beta/projects/:projectId/flavors"
  params:
    - name: projectId
      value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
      type: path
      description: Project identifier.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Git flavors.
    request:
      url: "{{baseUrl}}/v1beta/projects/:projectId/flavors"
      method: GET
      params:
        - name: projectId
          value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
          type: path
          description: Project identifier.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "flavors": [
              {
                "availability": "available",
                "description": "",
                "display_name": "",
                "id": "",
                "sku": ""
              }
            ]
          }
  - name: 400 Response
    description: Bad Request.
    request:
      url: "{{baseUrl}}/v1beta/projects/:projectId/flavors"
      method: GET
      params:
        - name: projectId
          value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
          type: path
          description: Project identifier.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "details": [],
            "message": "Internal server error."
          }
  - name: 401 Response
    description: Unauthorized.
    request:
      url: "{{baseUrl}}/v1beta/projects/:projectId/flavors"
      method: GET
      params:
        - name: projectId
          value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
          type: path
          description: Project identifier.
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not found.
    request:
      url: "{{baseUrl}}/v1beta/projects/:projectId/flavors"
      method: GET
      params:
        - name: projectId
          value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
          type: path
          description: Project identifier.
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal server error.
    request:
      url: "{{baseUrl}}/v1beta/projects/:projectId/flavors"
      method: GET
      params:
        - name: projectId
          value: 83b8e9c4-e3d1-4dc4-bb89-9854c8b5383e
          type: path
          description: Project identifier.
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "details": [],
            "message": "Internal server error."
          }

docs: |
  Provides detailed information about possible Git Flavors.
