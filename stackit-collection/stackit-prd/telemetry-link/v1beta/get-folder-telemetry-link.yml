info:
  name: get-folder-telemetry-link
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v1beta/folders/:folderId/regions/:regionId/telemetry-link"
  params:
    - name: folderId
      value: ""
      type: path
      description: The STACKIT portal folder UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns the details for the given Telemetry Link within the folder.
