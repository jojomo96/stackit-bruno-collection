  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/v1beta/organizations/:organizationId/regions/:regionId/telemetry-link"
  params:
    - name: organizationId
      value: ""
      type: path
      description: The STACKIT portal organization UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
  auth: inherit

settings:
