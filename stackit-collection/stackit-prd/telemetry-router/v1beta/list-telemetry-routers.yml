info:
  name: list-telemetry-routers
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/telemetry-routers"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: pageToken
      value: ""
      type: query
      description: A token to retrieve the next page of results.
      disabled: true
    - name: pageSize
      value: "10"
      type: query
      description: Maximum number of items to return
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

