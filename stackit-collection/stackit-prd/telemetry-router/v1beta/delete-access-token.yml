info:
  name: delete-access-token
  type: http
  seq: 8

http:
  method: DELETE
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/telemetry-routers/:telemetryRouterId/access-tokens/:accessTokenId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: telemetryRouterId
      value: ""
      type: path
      description: The Telemetry Router UUID.
    - name: accessTokenId
      value: ""
      type: path
      description: The Access Token UUID.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Delete an access token for the given Telemetry Router by its ID.
