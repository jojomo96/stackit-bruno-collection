info:
  name: update-access-token
  type: http
  seq: 10

http:
  method: PUT
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/telemetry-routers/:telemetryRouterId/access-tokens/:accessTokenId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: telemetryRouterId
      value: ""
      type: path
      description: The Telemetry Router UUID.
    - name: accessTokenId
      value: ""
      type: path
      description: The Access Token UUID.
  body:
    type: json
    data: |-
      {
        "description": "",
        "displayName": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update an existing access token for the given Telemetry Router by its ID.
