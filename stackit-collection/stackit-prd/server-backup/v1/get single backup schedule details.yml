  url: "{{baseUrl}}/v1/projects/:projectId/servers/:serverId/backup-schedules/:backupScheduleId"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: serverId
      value: ""
      type: path
      description: server id
    - name: backupScheduleId
      value: ""
      type: path
      description: backup schedule id
