info:
  name: delete-intake-runner
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/intake-runners/:intakeRunnerId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: intakeRunnerId
      value: ""
      type: path
      description: The intake runner UUID.
    - name: force
      value: "false"
      type: query
      description: If true, deletes all child resources. If false, the resource remains in a 'deletion state' while child resources exist.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Deletes the given intake runner.
