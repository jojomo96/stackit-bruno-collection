  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/intake-runners/:intakeRunnerId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: intakeRunnerId
      value: ""
      type: path
      description: The intake runner UUID.
  body:
    type: json
    data: |-
      {
        "description": "",
        "displayName": "",
        "labels": {},
        "maxMessageSizeKiB": 0,
        "maxMessagesPerHour": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Updates a intake runner within the project.
