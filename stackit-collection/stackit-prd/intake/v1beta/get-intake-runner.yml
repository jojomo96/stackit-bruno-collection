info:
  name: get-intake-runner
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/intake-runners/:intakeRunnerId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: intakeRunnerId
      value: ""
      type: path
      description: The intake runner UUID.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns the details for the given intake runner.
