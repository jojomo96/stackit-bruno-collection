info:
  name: list-intakes
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/intakes"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the resource is located in.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: pageToken
      value: ""
      type: query
      description: A token to retrieve the next page of results.
      disabled: true
    - name: pageSize
      value: "10"
      type: query
      description: Maximum number of items to return
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns a list of all intakes within the project.
