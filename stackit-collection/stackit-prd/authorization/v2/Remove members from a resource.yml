info:
  name: Remove members from a resource
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/v2/:resourceId/members/remove"
  params:
    - name: resourceId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "forceRemove": false,
        "members": [
          {
            "role": "owner",
            "subject": "user@mail.schwarz"
          }
        ],
        "resourceType": "organization"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Remove members from the given resource with specified roles.
