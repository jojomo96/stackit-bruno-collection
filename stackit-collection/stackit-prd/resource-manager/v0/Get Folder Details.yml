info:
  name: Get Folder Details
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/v2/folders/:containerId"
  params:
    - name: containerId
      value: ""
      type: path
      description: Folder identifier - containerId as well as UUID identifier is supported.
    - name: includeParents
      value: "false"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns all metadata for a specific folder.
