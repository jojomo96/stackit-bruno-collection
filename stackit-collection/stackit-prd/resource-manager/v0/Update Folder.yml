info:
  name: Update Folder
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/v2/folders/:containerId"
  params:
    - name: containerId
      value: ""
      type: path
      description: Folder identifier - containerId as well as UUID identifier is supported.
  body:
    type: json
    data: |-
      {
        "containerParentId": "name-of-parent-173523",
        "labels": {},
        "name": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

