  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}/v2/projects"
  body:
    type: json
    data: |-
      {
        "containerParentId": "name-of-parent-173523",
        "labels": {},
        "members": [
          {
            "role": "",
            "subject": "max.musterman@mail.schwarz"
          }
        ],
        "name": "My first project"
      }
  auth: inherit

settings:
