info:
  name: Get Project Details
  type: http
  seq: 15

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:id"
  params:
    - name: id
      value: ""
      type: path
      description: Project identifier - containerId as well as UUID identifier is supported.
    - name: includeParents
      value: "false"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns the project and its metadata.
