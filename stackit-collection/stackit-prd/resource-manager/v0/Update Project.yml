      value: ""
      type: path
      description: Project identifier - containerId as well as UUID identifier is supported.
  body:
    type: json
    data: |-
      {
        "containerParentId": "name-of-parent-173523",
        "labels": {},
        "name": ""
      }
  auth: inherit

