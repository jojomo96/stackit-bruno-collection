info:
  name: GetACL
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/acls/:aclId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the Secrets Manager instance is part of.
    - name: instanceId
      value: ""
      type: path
      description: The Secrets Manager instance UUID.
    - name: aclId
      value: ""
      type: path
      description: The acl UUID of the Secrets Manager instance.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns the details for the given acl.
