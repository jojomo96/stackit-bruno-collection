info:
  name: CreateInstance
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the Secrets Manager instance is part of.
  body:
    type: json
    data: |-
      {
        "kmsKey": {
          "keyId": "",
          "keyRingId": "",
          "keyVersion": 0,
          "serviceAccountEmail": ""
        },
        "name": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

