info:
  name: ListInstances
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the Secrets Manager instance is part of.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns a list of all Secrets Manager instances within the project.
