info:
  name: ListInstances
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the Secrets Manager instance is part of.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response with all instances.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the Secrets Manager instance is part of.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "instances": [
              {
                "apiUrl": "",
                "creationFinishedDate": "",
                "creationStartDate": "",
                "id": "",
                "kmsKey": {
                  "keyId": "",
                  "keyRingId": "",
                  "keyVersion": 0,
                  "serviceAccountEmail": ""
                },
                "name": "",
                "secretCount": 0,
                "secretsEngine": "",
                "state": "",
                "updateFinishedDate": "",
                "updateStartDate": ""
              }
            ]
          }
  - name: 400 Response
    description: Bad Request.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the Secrets Manager instance is part of.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "invalid instance name"
          }
  - name: 401 Response
    description: Unauthorized. You may have provided no or wrong credentials.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the Secrets Manager instance is part of.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: Jwt is missing
  - name: 500 Response
    description: Internal server error. The application experienced some unexpected situation.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the Secrets Manager instance is part of.
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: Returns a list of all Secrets Manager instances within the project.
