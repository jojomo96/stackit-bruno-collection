    description: All users for the Secrets Manager instance have been returned.
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/users"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The STACKIT portal project UUID the Secrets Manager instance is part of.
        - name: instanceId
          value: ""
          type: path
          description: The Secrets Manager instance UUID.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "users": [
              {
                "description": "",
                "id": "",
                "password": "",
                "username": "",
                "write": false
