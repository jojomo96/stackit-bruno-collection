info:
  name: ListUsers
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/users"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the Secrets Manager instance is part of.
    - name: instanceId
      value: ""
      type: path
      description: The Secrets Manager instance UUID.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
