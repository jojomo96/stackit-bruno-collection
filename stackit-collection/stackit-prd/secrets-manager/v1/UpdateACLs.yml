  type: http
  seq: 8

http:
  method: PUT
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/acls"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the Secrets Manager instance is part of.
    - name: instanceId
      value: ""
      type: path
      description: The Secrets Manager instance UUID.
  body:
    type: json
    data: |-
      {
        "cidrs": [
          {
            "cidr": ""
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

