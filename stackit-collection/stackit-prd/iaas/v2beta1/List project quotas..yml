info:
  name: List project quotas.
  type: http
  seq: 80

http:
  method: GET
  url: "{{baseUrl}}/v2beta1/projects/:projectId/regions/:region/quotas"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List quota limits and usage for project resources.
