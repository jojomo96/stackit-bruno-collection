info:
  name: Import a public key.
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v2beta1/keypairs"
  body:
    type: json
    data: |-
      {
        "createdAt": "",
        "fingerprint": "",
        "labels": {
          "key": "value"
        },
        "name": "schluesselbaer26",
        "publicKey": "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIDsPd27M449akqCtdFg2+AmRVJz6eWio0oMP9dVg7Xe",
        "updatedAt": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

