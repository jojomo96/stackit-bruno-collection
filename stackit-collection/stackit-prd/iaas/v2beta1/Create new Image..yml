info:
  name: Create new Image.
  type: http
  seq: 50

http:
  method: POST
  url: "{{baseUrl}}/v2beta1/projects/:projectId/regions/:region/images"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
  body:
    type: json
    data: |-
      {
        "active": true,
        "diskFormat": "qcow2",
        "labels": {
          "key": "value"
        },
        "minDiskSize": 10,
        "minRam": 1,
        "name": "niceImage",
        "protected": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new Image in a project. This call, if successful, returns a pre-signed URL for the customer to upload the image.
