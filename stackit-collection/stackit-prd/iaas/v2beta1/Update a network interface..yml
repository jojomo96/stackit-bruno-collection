info:
  name: Update a network interface.
  type: http
  seq: 72

http:
  method: PATCH
  url: "{{baseUrl}}/v2beta1/projects/:projectId/regions/:region/networks/:networkId/nics/:nicId"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: networkId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Network.
    - name: nicId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a network interface.
  body:
    type: json
    data: |-
      {
        "allowedAddresses": [],
        "description": "cool description dude. Wanna play some Snakeybus?",
        "labels": {
          "key": "value"
        },
        "name": "objectName26",
        "nicSecurity": false,
        "securityGroups": [
          "d61a8564-c8dd-4ffb-bc15-143e7d0c85ed"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update the properties of an existing network interface inside a network.
