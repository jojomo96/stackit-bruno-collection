info:
  name: Create new network.
  type: http
  seq: 64

http:
  method: POST
  url: "{{baseUrl}}/v2beta1/projects/:projectId/regions/:region/networks"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
  body:
    type: json
    data: |-
      {
        "dhcp": "",
        "ipv4": {},
        "ipv6": {},
        "labels": {
          "key": "value"
        },
        "name": "objectName26",
        "routed": true,
        "routingTableId": "d61a8564-c8dd-4ffb-bc15-143e7d0c85ed"
      }
  auth: inherit

settings:
