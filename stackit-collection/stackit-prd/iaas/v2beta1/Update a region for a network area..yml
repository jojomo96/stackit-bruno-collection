info:
  name: Update a region for a network area.
  type: http
  seq: 16

http:
  method: PATCH
  url: "{{baseUrl}}/v2beta1/organizations/:organizationId/network-areas/:areaId/regions/:region"
  params:
    - name: organizationId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Organization.
    - name: areaId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Network Area.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
  body:
    type: json
    data: |-
      {
        "ipv4": {
          "defaultNameservers": [
            "10.1.2.10"
          ],
          "defaultPrefixLen": 24,
          "maxPrefixLen": 29,
          "minPrefixLen": 24
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update a new region for a network area.
