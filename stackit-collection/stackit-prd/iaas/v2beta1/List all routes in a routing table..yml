info:
  name: List all routes in a routing table.
  type: http
  seq: 32

http:
  method: GET
  url: "{{baseUrl}}/v2beta1/organizations/:organizationId/network-areas/:areaId/regions/:region/routing-tables/:routingTableId/routes"
  params:
    - name: organizationId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Organization.
    - name: areaId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Network Area.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: routingTableId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Routing Table.
    - name: label_selector
      value: ""
      type: query
      description: Filter resources by labels.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get a list of all routes in a routing table.
