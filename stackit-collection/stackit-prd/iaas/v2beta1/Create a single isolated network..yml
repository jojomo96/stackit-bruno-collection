info:
  name: Create a single isolated network.
  type: http
  seq: 60

http:
  method: POST
  url: "{{baseUrl}}/v2beta1/projects/:projectId/regions/:region/isolated-network"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
  body:
    type: json
    data: |-
      {
        "dhcp": "",
        "ipv4": {},
        "labels": {
          "key": "value"
        },
        "name": "objectName26"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Creates an isolated network which is not connected to other networks in this project. We recommend using this endpoint only if you are fully aware of its purpose and the consequences of its execution.
