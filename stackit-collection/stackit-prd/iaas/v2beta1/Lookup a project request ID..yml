info:
  name: Lookup a project request ID.
  type: http
  seq: 81

http:
  method: GET
  url: "{{baseUrl}}/v2beta1/projects/:projectId/regions/:region/requests/:requestId"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: requestId
      value: req-d61a8564c8dd4ffbbc15143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Request.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Lookup a project request ID from a previous request. This allows to find resource IDs of resources generated during a projects request.
