info:
  name: Delete an SSH keypair.
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/v2beta1/keypairs/:keypairName"
  params:
    - name: keypairName
      value: keypair-123
      type: path
      description: The name of an SSH keypair.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Delete an SSH keypair from a user.
