info:
  name: Update Image Parameters.
  type: http
  seq: 53

http:
  method: PATCH
  url: "{{baseUrl}}/v2beta1/projects/:projectId/regions/:region/images/:imageId"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: imageId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Image.
  body:
    type: json
    data: |-
      {
        "name": "fancyNewName"
      }
  auth: inherit

settings:
