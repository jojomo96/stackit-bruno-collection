info:
  name: Set image share.
  type: http
  seq: 57

http:
  method: PUT
  url: "{{baseUrl}}/v2beta1/projects/:projectId/regions/:region/images/:imageId/share"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: imageId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Image.
  body:
    type: json
    data: |-
      {
        "parentOrganization": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

