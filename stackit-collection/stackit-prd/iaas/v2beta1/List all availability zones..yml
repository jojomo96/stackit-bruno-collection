info:
  name: List all availability zones.
  type: http
  seq: 135

http:
  method: GET
  url: "{{baseUrl}}/v2beta1/regions/:region/availability-zones"
  params:
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get a list of all availability zones.
