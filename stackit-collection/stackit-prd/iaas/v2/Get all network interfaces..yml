info:
  name: Get all network interfaces.
  type: http
  seq: 101

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/servers/:serverId/nics"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: serverId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Server.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get all network interfaces attached to the server.
