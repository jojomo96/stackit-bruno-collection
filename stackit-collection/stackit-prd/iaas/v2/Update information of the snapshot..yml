info:
  name: Update information of the snapshot.
  type: http
  seq: 126

http:
  method: PATCH
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/snapshots/:snapshotId"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: snapshotId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Snapshot.
  body:
    type: json
    data: |-
      {
        "labels": {
          "foo": "foobar"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

