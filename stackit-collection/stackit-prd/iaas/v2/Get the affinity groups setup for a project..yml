info:
  name: Get the affinity groups setup for a project.
  type: http
  seq: 39

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/affinity-groups"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the affinity groups created in a project. Affinity groups are an indication of locality of a server relative to another group of servers. They can be either running on the same host (affinity) or on different ones (anti-affinity).
