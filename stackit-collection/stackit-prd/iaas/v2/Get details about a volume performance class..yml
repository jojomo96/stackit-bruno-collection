info:
  name: Get details about a volume performance class.
  type: http
  seq: 128

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/volume-performance-classes/:volumePerformanceClass"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: volumePerformanceClass
      value: storage_premium_perf6
      type: path
      description: The name of a STACKIT Volume performance class.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get details about a specific volume performance class.
