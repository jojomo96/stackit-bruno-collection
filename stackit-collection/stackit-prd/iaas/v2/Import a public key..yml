info:
  name: Import a public key.
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v2/keypairs"
  body:
    type: json
    data: |-
      {
        "createdAt": "",
        "fingerprint": "",
        "labels": {
          "key": "value"
        },
        "name": "schluesselbaer26",
        "publicKey": "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIDsPd27M449akqCtdFg2+AmRVJz6eWio0oMP9dVg7Xe",
        "updatedAt": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Import a new public key for the requesting user based on provided public key material. The creation will fail if an SSH keypair with the same name already exists. If a name is not provided it is autogenerated form the ssh-pubkey comment section. If that is also not present it will be the the MD5 fingerprint of the key. For autogenerated names invalid characters will be removed.
