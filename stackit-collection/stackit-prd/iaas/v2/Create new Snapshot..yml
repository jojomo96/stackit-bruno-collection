info:
  name: Create new Snapshot.
  type: http
  seq: 123

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/snapshots"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
  body:
    type: json
    data: |-
      {
        "name": "abfahrt",
        "volumeId": "d61a8564-c8dd-4ffb-bc15-143e7d0c85ed"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new Snapshot from a Volume in a project.
