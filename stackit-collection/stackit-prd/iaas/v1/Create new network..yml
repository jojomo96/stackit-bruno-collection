info:
  name: Create new network.
  type: http
  seq: 51

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/networks"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
  body:
    type: json
    data: |-
      {
        "addressFamily": {
          "ipv4": {
            "nameservers": [
              "10.1.2.10"
            ],
            "prefix": "10.0.3.0/25"
          }
        },
        "name": "My Network"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

