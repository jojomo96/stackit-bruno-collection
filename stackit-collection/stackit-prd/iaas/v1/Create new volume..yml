info:
  name: Create new volume.
  type: http
  seq: 117

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/volumes"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
  body:
    type: json
    data: |-
      {
        "availabilityZone": "eu01-1",
        "size": 10
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new volume in a project. If a volume source is not provided, an empty volume will be created. The size property is required if no source or an image source is provided.
