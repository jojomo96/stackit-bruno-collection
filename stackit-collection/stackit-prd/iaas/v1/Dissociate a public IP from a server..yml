info:
  name: Dissociate a public IP from a server.
  type: http
  seq: 91

http:
  method: DELETE
  url: "{{baseUrl}}/v1/projects/:projectId/servers/:serverId/public-ips/:publicIpId"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: serverId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Server.
    - name: publicIpId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a Public IP.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

