info:
  name: Delete a volume.
  type: http
  seq: 118

http:
  method: DELETE
  url: "{{baseUrl}}/v1/projects/:projectId/volumes/:volumeId"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: volumeId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Volume.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Delete a volume inside a project. The deletion will fail if the volume is still in use.
