info:
  name: Boot up a server.
  type: http
  seq: 101

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/servers/:serverId/start"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: serverId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Server.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Start an existing server or allocates the server if deallocated.
