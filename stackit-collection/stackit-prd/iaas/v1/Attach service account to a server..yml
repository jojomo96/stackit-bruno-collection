info:
  name: Attach service account to a server.
  type: http
  seq: 100

http:
  method: PUT
  url: "{{baseUrl}}/v1/projects/:projectId/servers/:serverId/service-accounts/:serviceAccountMail"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: serverId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Server.
    - name: serviceAccountMail
      value: example@compute.sa.stackit.cloud
      type: path
      description: The e-mail address of a service account.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Attach an additional service account to the server.
