info:
  name: Update network area settings.
  type: http
  seq: 12

http:
  method: PATCH
  url: "{{baseUrl}}/v1/organizations/:organizationId/network-areas/:areaId"
  params:
    - name: organizationId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Organization.
    - name: areaId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Network Area.
  body:
    type: json
    data: |-
      {
        "addressFamily": {
          "ipv4": {
            "defaultNameservers": [
              "10.1.2.10"
            ],
            "defaultPrefixLen": 24,
            "maxPrefixLen": 26,
            "minPrefixLen": 22
          }
        },
        "labels": {
          "environment": "production"
        },
        "name": "My STACKIT Internet Network Area"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update the settings of a network area in an organization.
