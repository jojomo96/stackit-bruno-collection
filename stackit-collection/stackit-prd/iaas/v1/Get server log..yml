info:
  name: Get server log.
  type: http
  seq: 85

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/servers/:serverId/log"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: serverId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Server.
    - name: length
      value: "2000"
      type: query
      description: Request the server log. By default the length is limited to 2000 lines. Set to 0 to retrieve the complete log.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get server console log.
