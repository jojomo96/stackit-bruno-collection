info:
  name: Create new Image.
  type: http
  seq: 36

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/images"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
  body:
    type: json
    data: |-
      {
        "active": true,
        "diskFormat": "qcow2",
        "labels": {
          "key": "value"
        },
        "minDiskSize": 10,
        "minRam": 1,
        "name": "niceImage",
        "protected": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new Image in a project. This call, if successful, returns a pre-signed URL for the customer to upload the image.
