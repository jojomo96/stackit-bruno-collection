info:
  name: Create new network area in an organization.
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/v1/organizations/:organizationId/network-areas"
  params:
    - name: organizationId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Organization.
  body:
    type: json
    data: |-
      {
        "addressFamily": {
          "ipv4": {
            "defaultNameservers": [
              "10.1.2.10"
            ],
            "defaultPrefixLen": 24,
            "maxPrefixLen": 28,
            "minPrefixLen": 22,
            "networkRanges": [
              {
                "prefix": "10.0.0.0/16"
              }
            ],
            "routes": [
              {
                "nexthop": "10.1.2.10",
                "prefix": "192.168.0.0/24"
              }
            ],
            "transferNetwork": "10.1.2.0/24"
          }
        },
        "labels": {
          "environment": "production"
        },
        "name": "My STACKIT Internet Network Area"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new network area in an organization.
