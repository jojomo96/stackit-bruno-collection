info:
  name: Update the size of a volume.
  type: http
  seq: 121

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/volumes/:volumeId/resize"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: volumeId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Volume.
  body:
    type: json
    data: |-
      {
        "size": 1337
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update the size of a block device volume. The new volume size must be larger than the current size.
