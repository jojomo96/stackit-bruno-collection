      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: imageId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Image.
  auth: inherit

settings:
