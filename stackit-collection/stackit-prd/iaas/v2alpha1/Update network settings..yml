info:
  name: Update network settings.
  type: http
  seq: 16

http:
  method: PATCH
  url: "{{baseUrl}}/v2alpha1/projects/:projectId/regions/:region/networks/:networkId"
  params:
    - name: projectId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Project.
    - name: region
      value: eu01
      type: path
      description: The STACKIT Region of the resources.
    - name: networkId
      value: d61a8564-c8dd-4ffb-bc15-143e7d0c85ed
      type: path
      description: The identifier (ID) of a STACKIT Network.
  body:
    type: json
    data: |-
      {
        "ipv4": {
          "nameservers": [
            "10.1.2.10"
          ]
        },
        "name": "My Network"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update the settings of a network inside a project.
