info:
  name: get service instances list
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances"
  params:
    - name: projectId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

