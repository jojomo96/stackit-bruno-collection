info:
  name: Create instance
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
  body:
    type: json
    data: |-
      {
        "acl": {
          "items": [
            "0.0.0.0/0"
          ]
        },
        "backupSchedule": "6 6 * * *",
        "flavorId": "1.1",
        "labels": {},
        "name": "",
        "options": {},
        "replicas": 3,
        "storage": {
          "class": "",
          "size": 10
        },
        "version": "1.0"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create and deploys an instance<br/> Note that the time format for the backupSchedule is in UTC
