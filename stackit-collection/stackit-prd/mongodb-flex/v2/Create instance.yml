info:
  name: Create instance
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  body:
    type: json
    data: |-
      {
        "acl": {},
        "backupSchedule": "6 6 * * *",
        "flavorId": "1.1",
        "labels": {},
        "name": "",
        "options": {},
        "replicas": 3,
        "storage": {
          "class": "",
          "size": 10
        },
        "version": "1.0"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create and deploys an instance<br/> Note that the time format for the backupSchedule is in UTC
