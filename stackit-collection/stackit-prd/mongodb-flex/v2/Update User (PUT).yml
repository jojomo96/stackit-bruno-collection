info:
  name: Update User (PUT)
  type: http
  seq: 22

http:
  method: PUT
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/users/:userId"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: instanceId
      value: ""
      type: path
      description: instance id
    - name: userId
      value: ""
      type: path
      description: user id
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  body:
    type: json
    data: |-
      {
        "database": "",
        "roles": [
          "readAnyDatabase"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

