info:
  name: Update schedule
  type: http
  seq: 11

http:
  method: PUT
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/backups"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: instanceId
      value: ""
      type: path
      description: instance id
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  body:
    type: json
    data: |-
      {
        "backupSchedule": "",
        "dailySnapshotRetentionDays": 0,
        "monthlySnapshotRetentionMonths": 0,
        "pointInTimeWindowHours": 0,
        "snapshotRetentionDays": 0,
        "weeklySnapshotRetentionWeeks": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

