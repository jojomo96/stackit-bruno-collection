info:
  name: Clone instance
  type: http
  seq: 13

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/clone"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: instanceId
      value: ""
      type: path
      description: instance id
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  body:
    type: json
    data: |-
      {
        "instanceId": "",
        "timestamp": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

