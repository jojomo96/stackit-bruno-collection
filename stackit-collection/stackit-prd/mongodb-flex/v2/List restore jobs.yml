info:
  name: List restore jobs
  type: http
  seq: 15

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/restores"
  params:
    - name: projectId
      value: ""
      type: path
      description: project id
    - name: instanceId
      value: ""
      type: path
      description: instance id
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

