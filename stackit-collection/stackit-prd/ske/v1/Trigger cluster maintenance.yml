info:
  name: Trigger cluster maintenance
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/clusters/:clusterName/maintenance"
  params:
    - name: projectId
      value: ""
      type: path
    - name: clusterName
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Trigger immediate maintenance of the cluster. The autoUpdate configuration specified in the Maintenance object of the cluster spec defines what is updated during the immediate maintenance operation.
