http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/clusters/:clusterName/kubeconfig"
  params:
    - name: projectId
      value: ""
      type: path
    - name: clusterName
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "expirationSeconds": ""
      }
  auth: inherit

settings:
