info:
  name: Get a kubeconfig for use with the STACKIT CLI
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/clusters/:clusterName/kubeconfig/login"
  params:
    - name: projectId
      value: ""
      type: path
    - name: clusterName
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Request handled successfully
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/clusters/:clusterName/kubeconfig/login"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
        - name: clusterName
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "kubeconfig": "kubeconfig"
          }
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/clusters/:clusterName/kubeconfig/login"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
        - name: clusterName
          value: ""
          type: path
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/clusters/:clusterName/kubeconfig/login"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
        - name: clusterName
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 404 Response
    description: Project or cluster not found
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/clusters/:clusterName/kubeconfig/login"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
        - name: clusterName
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"

docs: A kubeconfig retrieved using this endpoint does not contain any credentials and instead obtains valid credentials via the STACKIT CLI.
