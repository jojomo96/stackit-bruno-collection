info:
  name: Delete a cluster
  type: http
  seq: 2

http:
  method: DELETE
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/clusters/:clusterName"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: clusterName
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
