    description: Accepted, deletion of cluster happens asynchronously. The deletion is done as soon as GetCluster returns a 404 code. The progress can be observed in the GetCluster's lastOperation field that contains a progress indicator.
    request:
      url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/clusters/:clusterName"
