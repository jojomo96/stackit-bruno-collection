http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/clusters"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Return a list of Kubernetes clusters in the project specified by `projectId`.
