info:
  name: get latest backup information for provided instanceId
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/backups"
  params:
    - name: instanceId
      value: ""
      type: path
      description: Instance id
    - name: projectId
      value: ""
      type: path
      description: Project id on which user has permissions
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/backups"
      method: GET
      params:
        - name: instanceId
          value: ""
          type: path
          description: Instance id
        - name: projectId
          value: ""
          type: path
          description: Project id on which user has permissions
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "instanceBackups": [
              {
                "downloadable": false,
                "finished_at": "",
                "id": 0,
                "size": 0,
                "status": "",
                "triggered_at": ""
              }
            ]
          }
  - name: 404 Response
    description: Not Found
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/backups"
