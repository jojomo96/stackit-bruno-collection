info:
  name: Update Backup Schedule
  type: http
  seq: 9

http:
  method: PUT
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/backups"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: instanceId
      value: ""
      type: path
      description: Instance ID
  body:
    type: json
    data: |-
      {
        "backupSchedule": "6 6 * * *"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update backup schedule
