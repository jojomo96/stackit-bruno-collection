info:
  name: List Instances
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List available instances
