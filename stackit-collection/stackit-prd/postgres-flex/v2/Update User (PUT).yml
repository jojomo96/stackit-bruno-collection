  type: http
  seq: 23

http:
  method: PUT
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/users/:userId"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the project
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: instanceId
      value: ""
      type: path
      description: The ID of the instance
    - name: userId
      value: ""
      type: path
      description: The ID of the user in the database
  body:
    type: json
    data: |-
      {
        "database": "",
        "roles": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

