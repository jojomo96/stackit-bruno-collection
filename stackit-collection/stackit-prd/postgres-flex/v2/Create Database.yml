http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/databases"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: instanceId
      value: ""
      type: path
      description: Instance ID
  body:
    type: json
    data: |-
      {
        "name": "Test",
        "options": {}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create database for a user
  Note: The name of a valid user must be provided in the "options" map field using the key "owner"
