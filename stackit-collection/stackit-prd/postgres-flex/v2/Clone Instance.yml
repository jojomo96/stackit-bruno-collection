info:
  name: Clone Instance
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/clone"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: instanceId
      value: ""
      type: path
      description: Instance ID
  body:
    type: json
    data: |-
      {
        "class": "premium-perf6-stackit",
        "size": 10,
        "timestamp": "2023-04-17T09:28:00+00:00"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

