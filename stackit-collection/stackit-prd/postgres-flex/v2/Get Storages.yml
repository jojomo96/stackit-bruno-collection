info:
  name: Get Storages
  type: http
  seq: 25

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/storages/:flavorId"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: flavorId
      value: ""
      type: path
      description: Flavor ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get available storages for a specific flavor
