info:
  name: Create Instance
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
  body:
    type: json
    data: |-
      {
        "acl": {
          "items": [
            "0.0.0.0/0"
          ]
        },
        "backupSchedule": "6 6 * * *",
        "flavorId": "1.1",
        "labels": {},
        "name": "",
        "options": {},
        "replicas": 3,
        "storage": {
          "class": "",
          "size": 10
        },
        "version": "1.0"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

