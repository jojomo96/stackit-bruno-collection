info:
  name: trigger a restore
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/backups/:backupId/restore"
  params:
    - name: instanceId
      value: ""
      type: path
      description: Instance id
    - name: projectId
      value: ""
      type: path
      description: Project id on which user has permissions
    - name: backupId
      value: ""
      type: path
      description: Backup id
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

