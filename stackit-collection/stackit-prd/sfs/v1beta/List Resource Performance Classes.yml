    description: OK
    request:
      url: "{{baseUrl}}/v1beta/resourcePoolPerformanceClasses"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "performanceClasses": [
              {
                "iops": 0,
                "name": "",
                "throughput": 0
              }
            ]
          }
  - name: 400 Response
    description: Some fields of the request have failed the validation procedure.
    request:
      url: "{{baseUrl}}/v1beta/resourcePoolPerformanceClasses"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/problem+json
      body:
        type: json
        data: ""
  - name: 401 Response
    description: Please make sure the Authorization Header is set and uses correct credentials
    request:
      url: "{{baseUrl}}/v1beta/resourcePoolPerformanceClasses"
      method: GET
    response:
      status: 401
