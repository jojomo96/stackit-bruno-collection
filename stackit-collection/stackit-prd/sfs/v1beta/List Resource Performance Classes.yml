info:
  name: List Resource Performance Classes
  type: http
  seq: 21

http:
  method: GET
  url: "{{baseUrl}}/v1beta/resourcePoolPerformanceClasses"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
