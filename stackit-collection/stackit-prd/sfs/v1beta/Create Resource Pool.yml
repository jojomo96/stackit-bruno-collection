info:
  name: Create Resource Pool
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:region/resourcePools"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "availabilityZone": "",
        "ipAcl": [],
        "labels": {},
        "name": "",
        "performanceClass": "",
        "sizeGigabytes": 0,
        "snapshotScheduleName": "",
        "snapshotsAreVisible": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a Resource Pool in a project.
