info:
  name: provision
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/instances"
  params:
    - name: projectId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "instanceName": "",
        "parameters": {
          "enable_monitoring": false,
          "graphite": "yourspace.your-graphite-endpoint.com:12345",
          "max_disk_threshold": 90,
          "metrics_frequency": 0,
          "metrics_prefix": "my-prefix",
          "monitoring_instance_id": "",
          "sgw_acl": "0.0.0.0/0",
          "syslog": [
            "logs4.your-syslog-endpoint.com:54321"
          ]
        },
        "planId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Provision a service instance.
