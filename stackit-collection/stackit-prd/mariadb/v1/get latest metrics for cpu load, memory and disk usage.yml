info:
  name: get latest metrics for cpu load, memory and disk usage
  type: http
  seq: 15

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/metrics"
  params:
    - name: instanceId
      value: ""
      type: path
      description: Instance id
    - name: projectId
      value: ""
      type: path
      description: Project id on which user has permissions
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/metrics"
      method: GET
      params:
        - name: instanceId
          value: ""
          type: path
          description: Instance id
        - name: projectId
          value: ""
          type: path
          description: Project id on which user has permissions
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "cpuIdleTime": 0,
            "cpuLoadPercent": 0,
            "cpuSystemTime": 0,
            "cpuUserTime": 0,
            "diskEphemeralTotal": 0,
            "diskEphemeralUsed": 0,
            "diskPersistentTotal": 0,
            "diskPersistentUsed": 0,
            "load1": 0,
            "load15": 0,
            "load5": 0,
            "memoryTotal": 0,
            "memoryUsed": 0,
            "parachuteDiskEphemeralActivated": false,
            "parachuteDiskEphemeralTotal": 0,
            "parachuteDiskEphemeralUsed": 0,
            "parachuteDiskEphemeralUsedPercent": 0,
            "parachuteDiskEphemeralUsedThreshold": 0,
            "parachuteDiskPersistentActivated": false,
            "parachuteDiskPersistentTotal": 0,
            "parachuteDiskPersistentUsed": 0,
            "parachuteDiskPersistentUsedPercent": 0,
            "parachuteDiskPersistentUsedThreshold": 0
          }
  - name: 404 Response
    description: Not Found
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/metrics"
      method: GET
      params:
        - name: instanceId
          value: ""
          type: path
          description: Instance id
        - name: projectId
          value: ""
          type: path
          description: Project id on which user has permissions
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "description": "",
            "error": ""
          }
