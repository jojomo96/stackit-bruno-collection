info:
  name: create auth token for shared model use
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/tokens"
  params:
    - name: regionId
      value: eu01
      type: path
      description: region name
    - name: projectId
      value: 904bb6ea-8632-4818-b26e-943557dc4f57
      type: path
      description: portal project id
  body:
    type: json
    data: |-
      {
        "description": "my token",
        "name": "my-token",
        "ttlDuration": "5h30m40s"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

