info:
  name: auth tokens for shared model in non dedicated instances
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/regions/:regionId/tokens"
  params:
    - name: regionId
      value: eu01
      type: path
      description: region name
    - name: projectId
      value: 904bb6ea-8632-4818-b26e-943557dc4f57
      type: path
      description: portal project id
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

