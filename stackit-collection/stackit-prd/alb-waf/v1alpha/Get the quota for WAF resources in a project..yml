info:
  name: Get the quota for WAF resources in a project.
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/v1alpha/projects/:projectId/regions/:region/quotas"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves the configured WAF resource quotas for the project. Limit can be changed via service request.
