info:
  name: Delete a CRS configuration
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/v1alpha/projects/:projectId/regions/:region/core-rule-sets/:name"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: name
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: To delete a core rule set (CRS) configuration this endpoint is used, but it is only possible to delete it if no WAF configuration is referencing it.
