info:
  name: List of CRS configurations
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v1alpha/projects/:projectId/regions/:region/core-rule-sets"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: pageSize
      value: ""
      type: query
      description: page_size specifies how many rule configurations should be returned on this page. Must be a positive number <= 1000
      disabled: true
    - name: pageId
      value: ""
      type: query
      description: page_id is a page identifier returned by the previous response and is used to request the next page
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List all existing core rule set (CRS) configurations that are stored in the project.
