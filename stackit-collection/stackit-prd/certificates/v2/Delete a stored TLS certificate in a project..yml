info:
  name: Delete a stored TLS certificate in a project.
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/certificates/:id"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
    - name: id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: DeleteCertificate will delete the stored TLS certificate.
