info:
  name: Get the quota for TLS certificates in a project.
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/quotas"
  params:
    - name: projectId
      value: ""
      type: path
    - name: region
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieves the configured TLS certificate quota for the project. Limit can be changed via service request.
