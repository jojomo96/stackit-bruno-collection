info:
  name: Get database collation list
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/collation"
  params:
    - name: projectId
      value: ""
      type: path
      description: The ID of the STACKIT project
    - name: instanceId
      value: ""
      type: path
      description: The ID of the instance
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/collation"
      method: GET
      params:
        - name: projectId
          value: ""
          type: path
          description: The ID of the STACKIT project
        - name: instanceId
          value: ""
          type: path
          description: The ID of the instance
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "collations": [
              {
                "collation_name": "Albanian_BIN",
                "description": "Albanian, binary sort"
              }
            ]
          }
