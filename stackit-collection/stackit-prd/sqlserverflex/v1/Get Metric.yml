info:
  name: Get Metric
  type: http
  seq: 18

http:
  method: GET
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/metrics/:metric"
  params:
    - name: projectId
      value: ""
      type: path
      description: The UUID of the project.
    - name: instanceId
      value: ""
      type: path
      description: The UUID of the instance.
    - name: metric
      value: ""
      type: path
      description: The name of the metric. Valid metrics are 'cpu', 'memory', 'data-disk-size', 'data-disk-use','log-disk-size', 'log-disk-use', 'life-expectancy' and 'connections'.
    - name: granularity
      value: ""
      type: query
      description: The granularity in ISO8601 e.g. 5 minutes are 'PT5M'.
    - name: period
      value: ""
      type: query
      description: The period in ISO8601 format e.g. 5 minutes are 'PT5M'. If no period is provided, the standard value of 5 minutes is used.
      disabled: true
    - name: start
      value: ""
      type: query
      description: The start of the timeframe as timestamp in ISO8601 (RFC3339) e.g. '2023-08-28T07:10:52.536Z'. If no start time is provided, current server time as UTC is used.
      disabled: true
    - name: end
      value: ""
      type: query
      description: The end of the timeframe as timestamp in ISO8601 (RFC3339) e.g. '2023-08-28T07:10:52.536Z'.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns a metric for an instance. The metric will only be for the master pod if needed. Granularity parameter is always needed. If start and end time is provided, period is not considered in max-connections and disk-use. If you provide start time, you have to provide end time as well and vice versa.
