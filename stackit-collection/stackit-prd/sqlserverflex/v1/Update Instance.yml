info:
  name: Update Instance
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: instanceId
      value: ""
      type: path
      description: Instance ID
  body:
    type: json
    data: |-
      {
        "acl": {},
        "backupSchedule": "6 6 * * *",
        "flavorId": "4.16-Single",
        "labels": {},
        "name": "test-instance",
        "version": "2022"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Update available instance of a mssql database.

  **Please note that any changes applied via PUT or PATCH requests will initiate a reboot of the SQL Server Flex Instance.**
