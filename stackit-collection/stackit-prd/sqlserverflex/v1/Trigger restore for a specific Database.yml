  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/v1/projects/:projectId/instances/:instanceId/backups/databases/:databaseName/restores"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: instanceId
      value: ""
      type: path
      description: Instance ID
    - name: databaseName
      value: ""
      type: path
      description: Database Name
  body:
    type: json
    data: |-
      {
        "name": "Peter_pan",
        "restoreDateTime": "2023-08-23T08:25:23+02:00"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

