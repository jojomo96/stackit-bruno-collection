info:
  name: Get Storages
  type: http
  seq: 27

http:
  method: GET
  url: "{{baseUrl}}/v3beta1/projects/:projectId/regions/:region/storages/:flavorId"
  params:
    - name: projectId
      value: 19feb036-9b61-11ee-b9d1-0242ac120002
      type: path
      description: The STACKIT project ID.
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
    - name: flavorId
      value: 4.16-Single
      type: path
      description: The id of an instance flavor.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: "OK: contains a list of storages available for a flavor."
    request:
      url: "{{baseUrl}}/v3beta1/projects/:projectId/regions/:region/storages/:flavorId"
      method: GET
      params:
        - name: projectId
          value: 19feb036-9b61-11ee-b9d1-0242ac120002
          type: path
          description: The STACKIT project ID.
        - name: region
          value: eu01
          type: path
          description: The region which should be addressed
        - name: region
          value: eu02
          type: path
          description: The region which should be addressed
          disabled: true
        - name: flavorId
          value: 4.16-Single
          type: path
          description: The id of an instance flavor.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "storageClasses": [
              {
                "class": "premium-perf2-stackit",
                "maxIoPerSec": 1000,
                "maxThroughInMb": 100
              }
            ],
            "storageRange": {
              "max": 1000,
              "min": 10
