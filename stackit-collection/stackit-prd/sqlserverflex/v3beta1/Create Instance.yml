info:
  name: Create Instance
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/v3beta1/projects/:projectId/regions/:region/instances"
  params:
    - name: projectId
      value: 19feb036-9b61-11ee-b9d1-0242ac120002
      type: path
      description: The STACKIT project ID.
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  body:
    type: json
    data: |-
      {
        "backupSchedule": "6 6 * * *",
        "encryption": {
          "kekKeyId": "b710a4d0-6694-4cd3-b55d-16446375174e",
          "kekKeyRingId": "48e3f816-3e38-44bb-bbff-22e05f0567de",
          "kekKeyVersion": "1",
          "serviceAccount": "example@compute.sa.stackit.cloud"
        },
        "flavorId": "4.16-Single",
        "name": "mssql-instance",
        "network": {
          "accessScope": "PUBLIC",
          "acl": [
            "198.51.100.0/24"
          ]
        },
        "retentionDays": 64,
        "storage": {
          "class": "premium-perf2-stackit",
          "size": 10
        },
        "version": "2022"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

