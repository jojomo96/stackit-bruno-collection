info:
  name: Get Versions
  type: http
  seq: 28

http:
  method: GET
  url: "{{baseUrl}}/v3beta1/projects/:projectId/regions/:region/versions"
  params:
    - name: projectId
      value: 19feb036-9b61-11ee-b9d1-0242ac120002
      type: path
      description: The STACKIT project ID.
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the sqlserver available versions for the project.
