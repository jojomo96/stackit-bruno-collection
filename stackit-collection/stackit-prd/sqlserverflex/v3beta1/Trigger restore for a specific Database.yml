info:
  name: Trigger restore for a specific Database
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/v3beta1/projects/:projectId/regions/:region/instances/:instanceId/backups/databases/:databaseName/restores"
  params:
    - name: projectId
      value: 19feb036-9b61-11ee-b9d1-0242ac120002
      type: path
      description: The STACKIT project ID.
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
    - name: instanceId
      value: fb30fa7e-b7d8-4c75-9f04-489e0ba2fe51
      type: path
      description: The ID of the instance.
    - name: databaseName
      value: database
      type: path
      description: The name of the database.
  body:
    type: json
    data: |-
      {
        "name": "MyDatabase",
        "restoreDateTime": "2023-12-30T23:25:05Z"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Trigger restore for a specific Database
