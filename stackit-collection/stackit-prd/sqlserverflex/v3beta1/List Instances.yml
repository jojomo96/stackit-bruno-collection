info:
  name: List Instances
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v3beta1/projects/:projectId/regions/:region/instances"
  params:
    - name: projectId
      value: 19feb036-9b61-11ee-b9d1-0242ac120002
      type: path
      description: The STACKIT project ID.
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: page
      value: "1"
      type: query
      description: Number of the page of items list to be returned.
    - name: size
      value: "10"
      type: query
      description: Number of items to be returned on each page.
    - name: sort
      value: index.desc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: index.asc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: id.desc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: id.asc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: is_deletable.desc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: is_deletable.asc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: name.asc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: name.desc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: status.asc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
    - name: sort
      value: status.desc
      type: query
      description: Sorting of the items to be returned on each page.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: List all available instances for your project.
