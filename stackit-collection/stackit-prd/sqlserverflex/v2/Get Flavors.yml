info:
  name: Get Flavors
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/flavors"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get available flavors for a specific projectID
