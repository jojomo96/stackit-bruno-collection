          value: eu01
          type: path
          description: The region which should be addressed
        - name: region
          value: eu02
          type: path
          description: The region which should be addressed
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "runningRestores": [
              {
                "command": "RESTORE DATABASE",
                "database_name": "test_db",
