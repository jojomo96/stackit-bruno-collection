info:
  name: Trigger backup for a specific Database
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/backups/databases/:databaseName"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: instanceId
      value: ""
      type: path
      description: Instance ID
    - name: databaseName
      value: ""
      type: path
      description: Database Name
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

