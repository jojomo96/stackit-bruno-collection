info:
  name: Get User
  type: http
  seq: 25

http:
  method: GET
  url: "{{baseUrl}}/v2/projects/:projectId/regions/:region/instances/:instanceId/users/:userId"
  params:
    - name: projectId
      value: ""
      type: path
      description: Project ID
    - name: instanceId
      value: ""
      type: path
      description: Instance ID
    - name: userId
      value: ""
      type: path
      description: User ID
    - name: region
      value: eu01
      type: path
      description: The region which should be addressed
    - name: region
      value: eu02
      type: path
      description: The region which should be addressed
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

