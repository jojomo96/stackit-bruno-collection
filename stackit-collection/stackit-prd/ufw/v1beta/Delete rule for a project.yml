info:
  name: Delete rule for a project
  type: http
  seq: 1

http:
  method: DELETE
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/rules"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: product
      value: ""
      type: query
      description: The product service (e.g., Load Balancer, Redis).
      disabled: true
    - name: instanceId
      value: ""
      type: query
      description: The ID of the source, similar to a project ID but for the product service instance.
      disabled: true
    - name: type
      value: ""
      type: query
      description: The type of the rule (e.g., "ACL", "PublicIP", "SecurityRule").
      disabled: true
    - name: sourceIP
      value: 1.2.3.4/32
      type: query
      description: The IP for the rule.
    - name: offset
      value: ""
      type: query
      description: The offset for the rule in the instance it is associated with.
      disabled: true
    - name: securityGroupId
      value: ""
      type: query
      description: The UUID of the group.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

