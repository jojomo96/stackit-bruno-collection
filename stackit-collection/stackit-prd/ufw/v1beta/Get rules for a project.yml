info:
  name: Get rules for a project
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/v1beta/projects/:projectId/regions/:regionId/rules"
  params:
    - name: projectId
      value: ""
      type: path
      description: The STACKIT portal project UUID the key ring is part of.
    - name: regionId
      value: eu01
      type: path
      description: The STACKIT region name the resource is located in.
    - name: regionId
      value: eu02
      type: path
      description: The STACKIT region name the resource is located in.
      disabled: true
    - name: securityGroupId
      value: ""
      type: query
      description: The UUID of the group.
      disabled: true
    - name: product
      value: ""
      type: query
      description: The product service (e.g., Load Balancer, Redis).
      disabled: true
    - name: instanceId
      value: ""
      type: query
      description: The ID of the source, similar to a project ID but for the product service instance.
      disabled: true
    - name: type
      value: ""
      type: query
      description: The type of the rule (e.g., "ACL", "PublicIP", "SecurityRule").
      disabled: true
    - name: sourceIP
      value: 1.2.3.4/32
      type: query
      description: The IP for the rule.
    - name: portRange
      value: 80-8080
      type: query
      description: The port range for the rule.
    - name: protocol
      value: ""
      type: query
      description: The protocol for the rule (e.g., "tcp", "udp").
      disabled: true
    - name: direction
      value: ingress
      type: query
      description: The direction of the rule (e.g., "ingress", "egress").
      disabled: true
    - name: direction
      value: egress
      type: query
      description: The direction of the rule (e.g., "ingress", "egress").
      disabled: true
    - name: etherType
      value: ""
      type: query
      description: The ether type for the rule.
      disabled: true
    - name: sortBy
      value: ""
      type: query
      description: The field to sort the response by.
      disabled: true
    - name: sortOrder
      value: asc
      type: query
      description: The order to sort the response by.
      disabled: true
    - name: sortOrder
      value: desc
      type: query
      description: The order to sort the response by.
      disabled: true
    - name: limit
      value: ""
      type: query
      description: The maximum number of items to return in the response. If maximum is exceeded, maximum is used.
      disabled: true
    - name: cursor
      value: ""
      type: query
      description: A pagination cursor that represents a position in the dataset. If given, results will be returned from the item after the cursor. If not given, results will be returned from the beginning.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

